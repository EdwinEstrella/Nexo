<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="components/paint-first.css">
    <title>Lending Ledger — Portal</title>
    <link rel="icon" type="image/x-icon" href="Logo.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="components/sidebar.css">
    <link rel="stylesheet" href="components/app-header.css">
    <link rel="stylesheet" href="components/dashboard-canvas.css">
    <link rel="stylesheet" href="components/portal-loans-canvas.css">
    <link rel="stylesheet" href="components/portal-analytics.css">
    <link rel="stylesheet" href="components/portal-clients.css">
    <link rel="stylesheet" href="components/portal-loan-request.css">
    <link rel="stylesheet" href="components/portal-settings.css">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        html { height: 100%; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #f9f9ff 0%, #ffffff 100%);
            color: #000e24;
            overflow-x: hidden;
            overflow-y: auto;
            width: 100%;
            min-height: 100%;
            min-height: 100dvh;
        }
        .titlebar {
            -webkit-app-region: drag;
            height: 32px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 8px;
            position: fixed;
            top: 0;
            left: var(--sidebar-width, 256px);
            right: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(196, 198, 208, 0.3);
        }
        .titlebar .window-controls { display: flex; margin-right: -8px; }
        .titlebar button {
            -webkit-app-region: no-drag;
            cursor: default;
            width: 46px;
            height: 32px;
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #515f74;
            transition: background 0.1s;
        }
        .titlebar button:hover { background: rgba(0, 0, 0, 0.05); }
        .titlebar button.close:hover { background: #e81123; color: white; }
        .main-content {
            padding: 118px clamp(16px, 4vw, 32px) 32px;
            min-height: 100vh;
            min-height: 100dvh;
            box-sizing: border-box;
        }
        .portal-welcome {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            padding: clamp(24px, 4vw, 40px);
            max-width: 42rem;
            box-shadow: 0 32px 64px -16px rgba(0, 14, 36, 0.06);
        }
        .portal-welcome h1 {
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
            font-size: clamp(1.35rem, 3vw, 1.75rem);
            margin-bottom: 12px;
        }
        .portal-welcome p {
            color: #515f74;
            line-height: 1.55;
            margin-bottom: 16px;
        }
        .portal-welcome a {
            color: #000e24;
            font-weight: 600;
        }
        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
        .portal-search-results[hidden] { display: none; }
        .portal-search-results {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            z-index: 1200;
            background: #ffffff;
            border: 1px solid rgba(0, 14, 36, 0.12);
            border-radius: 12px;
            box-shadow: 0 22px 48px rgba(0, 14, 36, 0.2);
            overflow: hidden;
            max-height: min(56vh, 420px);
            overflow-y: auto;
        }
        .portal-search-results__empty {
            padding: 14px 16px;
            color: #6b7891;
            font-size: 13px;
        }
        .portal-search-results__item {
            width: 100%;
            border: none;
            border-bottom: 1px solid #edf2ff;
            background: #fff;
            text-align: left;
            padding: 10px 12px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .portal-search-results__item:last-child { border-bottom: none; }
        .portal-search-results__item:hover {
            background: #f3f6ff;
        }
        .portal-search-results__title {
            color: #0f1f3b;
            font-size: 13px;
            font-weight: 700;
        }
        .portal-search-results__meta {
            color: #5b6880;
            font-size: 12px;
        }
        @media (max-width: 900px) {
            .titlebar { left: 0; }
            .main-content {
                padding-top: 118px;
                padding-left: clamp(12px, 3vw, 16px);
                padding-right: clamp(12px, 3vw, 16px);
            }
        }
    </style>
</head>
<body>
    <div class="titlebar">
        <div class="window-controls">
            <button id="min-btn" type="button" aria-label="Minimizar">
                <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="5" width="10" height="1" fill="currentColor"/></svg>
            </button>
            <button id="max-btn" type="button" aria-label="Maximizar">
                <svg id="max-icon" width="12" height="12" viewBox="0 0 12 12" style="display: block;"><rect x="1" y="1" width="10" height="10" fill="none" stroke="currentColor" stroke-width="1"/></svg>
                <svg id="restore-icon" width="12" height="12" viewBox="0 0 12 12" style="display: none;"><rect x="1" y="3" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1"/><polyline points="3 3 3 1 11 1 11 9" fill="none" stroke="currentColor" stroke-width="1"/></svg>
            </button>
            <button id="close-btn" type="button" class="close" aria-label="Cerrar">
                <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1L11 11M11 1L1 11" stroke="currentColor" stroke-width="1"/></svg>
            </button>
        </div>
    </div>

    <header class="app-header" data-node-id="1:280" aria-label="Barra superior">
        <div class="app-header__search-wrap">
            <span class="app-header__search-icon" aria-hidden="true">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/>
                </svg>
            </span>
            <input type="search" class="app-header__search" id="app-header-search" placeholder="Buscar préstamos, clientes o solicitudes…" autocomplete="off" aria-label="Buscar en el portal">
            <div class="portal-search-results" id="portal-search-results" hidden aria-label="Resultados de búsqueda"></div>
        </div>
        <div class="app-header__actions">
            <div class="app-header__icon-btns">
                <button type="button" class="app-header__icon-btn" aria-label="Notificaciones">
                    <svg width="16" height="20" viewBox="0 0 16 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M8 2C5.2 2 3 4.2 3 7v4l-2 2v1h14v-1l-2-2V7c0-2.8-2.2-5-5-5z"/>
                        <path d="M5.5 16a2.5 2.5 0 005 0"/>
                    </svg>
                </button>
                <button type="button" class="app-header__icon-btn" aria-label="Mensajes">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/>
                    </svg>
                </button>
                <button type="button" class="app-header__icon-btn" aria-label="Cartera">
                    <svg width="19" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M2 6l2-3h16l2 3"/>
                        <rect x="2" y="6" width="20" height="14" rx="2"/>
                        <path d="M2 10h20"/>
                        <path d="M16 14h.01"/>
                    </svg>
                </button>
            </div>
            <div class="app-header__divider" aria-hidden="true"></div>
            <div class="app-header__user">
                <div class="app-header__user-text">
                    <span class="app-header__user-name" id="app-header-user-name">Portal</span>
                    <span class="app-header__user-meta" id="app-header-user-meta">Lending Ledger</span>
                </div>
                <div class="app-header__avatar" id="app-header-avatar" aria-hidden="true">LL</div>
            </div>
        </div>
    </header>

    <div class="main-content">
        <div id="portal-main" class="portal-main-root"></div>
    </div>

    <script src="components/auth-roles.js"></script>
    <script src="components/sidebar.js"></script>
    <script>
        const PORTAL_VIEWS = new Set(['dashboard', 'loans', 'analytics', 'clients', 'loan-request', 'settings'])
        const PORTAL_FRAGMENTS = {
            dashboard: 'fragments/empresa-dashboard-inner.html',
            loans: 'fragments/portal-loans-inner.html',
            analytics: 'fragments/portal-analytics-inner.html',
            clients: 'fragments/portal-clients-inner.html',
            'loan-request': 'fragments/portal-loan-request-inner.html',
            settings: 'fragments/portal-settings-inner.html'
        }
        const PORTAL_TITLES = {
            dashboard: 'Lending Ledger — Portal',
            loans: 'Lending Ledger — Préstamos',
            analytics: 'Lending Ledger — Análisis',
            clients: 'Lending Ledger — Clientes',
            'loan-request': 'Lending Ledger — Nueva solicitud',
            settings: 'Lending Ledger — Configuración'
        }

        function getInitialPortalView () {
            try {
                let v = new URL(window.location.href).searchParams.get('view')
                if (v === 'documents') v = 'loan-request'
                if (v && PORTAL_VIEWS.has(v)) return v
            } catch (_) {}
            return 'dashboard'
        }

        function portalNavigate (pageId) {
            void loadPortalView(pageId, { pushState: true })
        }

        function initialsFromName (name) {
            const parts = name.trim().split(/\s+/).filter(Boolean)
            if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase()
            return name.slice(0, 2).toUpperCase() || 'LL'
        }

        let portalSidebar = null
        let portalUserEmail = ''
        let portalCurrentView = 'dashboard'
        const nexoPortalProfile = { email: '', displayName: '', company: '', roleLine: '' }
        const PORTAL_SEARCH_INDEX = [
            { id: 'dash', title: 'Dashboard general', meta: 'KPIs, cartera y próximos pagos', view: 'dashboard', keywords: 'inicio resumen panel principal' },
            { id: 'loans-list', title: 'Préstamos', meta: 'Ver cartera y estados de préstamo', view: 'loans', keywords: 'cartera cuotas mora pagos' },
            { id: 'loans-pay', title: 'Registrar pago', meta: 'Aplicar pago a cuota (mora, interés, capital)', view: 'loans', focusSelector: '#loan-payment-form', keywords: 'abono capital interes mora cuota' },
            { id: 'clients', title: 'Clientes', meta: 'Directorio de clientes y estado', view: 'clients', keywords: 'personas cedula telefono historial' },
            { id: 'new-loan', title: 'Nuevo préstamo', meta: 'Crear solicitud nueva', view: 'loan-request', focusSelector: '#loan-request-form', keywords: 'solicitud crear prestamo nuevo' },
            { id: 'analytics', title: 'Análisis', meta: 'Reportes y métricas', view: 'analytics', keywords: 'reportes ganancias morosos exportar' },
            { id: 'settings-account', title: 'Configuración · Cuenta y perfil', meta: 'Nombre, correo, teléfono, idioma', view: 'settings', settingsTab: 'cuenta', keywords: 'perfil cuenta usuario idioma zona horaria' },
            { id: 'settings-org', title: 'Configuración · Institución', meta: 'Datos legales, sector, contacto', view: 'settings', settingsTab: 'institucion', keywords: 'empresa institucion razon social direccion slug' },
            { id: 'settings-notify', title: 'Configuración · Notificaciones', meta: 'Correos y avisos', view: 'settings', settingsTab: 'notificaciones', keywords: 'recordatorio aviso correo campana notificacion' },
            { id: 'settings-security', title: 'Configuración · Seguridad', meta: 'Contraseña y sesión', view: 'settings', settingsTab: 'seguridad', keywords: 'password seguridad sesion timeout' },
            { id: 'settings-appearance', title: 'Configuración · Apariencia', meta: 'Tema, densidad, acento', view: 'settings', settingsTab: 'apariencia', keywords: 'tema apariencia animaciones color interfaz' },
            { id: 'settings-data', title: 'Configuración · Datos y privacidad', meta: 'Retención y privacidad', view: 'settings', settingsTab: 'datos', keywords: 'datos privacidad retencion dpo exportar' },
            { id: 'settings-credit', title: 'Configuración · Políticas de crédito', meta: 'Mora, días de gracia, frecuencia, interés', view: 'settings', settingsTab: 'avanzado', focusSelector: '#settings-form-credit-policy', keywords: 'mora gracia interes frecuencia credito politicas' }
        ]

        function readProfilePrefs () {
            try {
                return JSON.parse(localStorage.getItem('nexo_ui_profile') || '{}')
            } catch (_) {
                return {}
            }
        }

        function writeProfilePrefs (partial) {
            try {
                const cur = readProfilePrefs()
                localStorage.setItem('nexo_ui_profile', JSON.stringify({ ...cur, ...partial }))
            } catch (_) {}
        }

        function readOrgPrefs () {
            try {
                return JSON.parse(localStorage.getItem('nexo_ui_org') || '{}')
            } catch (_) {
                return {}
            }
        }

        function writeOrgPrefs (partial) {
            try {
                const cur = readOrgPrefs()
                localStorage.setItem('nexo_ui_org', JSON.stringify({ ...cur, ...partial }))
            } catch (_) {}
        }

        function normalizeSearchText (value) {
            return String(value || '')
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .toLowerCase()
                .trim()
        }

        function findPortalSearchResults (query) {
            const q = normalizeSearchText(query)
            if (!q) return PORTAL_SEARCH_INDEX.slice(0, 8)
            return PORTAL_SEARCH_INDEX
                .filter((item) => {
                    const haystack = normalizeSearchText(`${item.title} ${item.meta} ${item.keywords}`)
                    return haystack.includes(q)
                })
                .slice(0, 10)
        }

        function hidePortalSearchResults () {
            const box = document.getElementById('portal-search-results')
            if (box) box.hidden = true
        }

        function renderPortalSearchResults (query) {
            const box = document.getElementById('portal-search-results')
            if (!box) return
            const items = findPortalSearchResults(query)
            if (!items.length) {
                box.innerHTML = '<div class="portal-search-results__empty">No encontramos funciones con ese término.</div>'
                box.hidden = false
                return
            }
            box.innerHTML = items.map((item) => `
                <button type="button" class="portal-search-results__item" data-search-item="${item.id}">
                    <span class="portal-search-results__title">${item.title}</span>
                    <span class="portal-search-results__meta">${item.meta}</span>
                </button>
            `).join('')
            box.hidden = false
        }

        async function openPortalSearchItemById (id) {
            const item = PORTAL_SEARCH_INDEX.find((x) => x.id === id)
            if (!item) return
            if (portalSidebar) portalSidebar.setActiveNavOnly(item.view)
            await loadPortalView(item.view, { pushState: true })

            if (item.settingsTab) {
                const tabBtn = document.querySelector(`#portal-main [data-settings-tab="${item.settingsTab}"]`)
                if (tabBtn) tabBtn.click()
            }
            if (item.focusSelector) {
                const target = document.querySelector(`#portal-main ${item.focusSelector}`)
                if (target && typeof target.focus === 'function') target.focus()
            }
            const searchInput = document.getElementById('app-header-search')
            if (searchInput) searchInput.value = ''
            hidePortalSearchResults()
        }

        function wirePortalSearch () {
            const input = document.getElementById('app-header-search')
            const box = document.getElementById('portal-search-results')
            if (!input || !box || input.dataset.searchWired === '1') return
            input.dataset.searchWired = '1'

            input.addEventListener('focus', () => {
                renderPortalSearchResults(input.value)
            })
            input.addEventListener('input', () => {
                renderPortalSearchResults(input.value)
            })
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault()
                    const first = box.querySelector('[data-search-item]')
                    if (first) void openPortalSearchItemById(first.getAttribute('data-search-item'))
                }
                if (e.key === 'Escape') hidePortalSearchResults()
            })
            box.addEventListener('click', (e) => {
                const btn = e.target.closest('[data-search-item]')
                if (!btn) return
                void openPortalSearchItemById(btn.getAttribute('data-search-item'))
            })
            document.addEventListener('click', (e) => {
                if (!e.target.closest('#app-header-search') && !e.target.closest('#portal-search-results')) {
                    hidePortalSearchResults()
                }
            })
        }

        const LOAN_SYSTEM_KEY = 'nexo_mortgage_system_v1'

        function randomId (prefix) {
            return `${prefix}_${Math.random().toString(36).slice(2, 10)}`
        }

        function fmtMoney (value) {
            const n = Number(value) || 0
            return `RD$${n.toLocaleString('es-DO', { maximumFractionDigits: 2, minimumFractionDigits: n % 1 ? 2 : 0 })}`
        }

        function isoToday () {
            const d = new Date()
            const y = d.getFullYear()
            const m = String(d.getMonth() + 1).padStart(2, '0')
            const day = String(d.getDate()).padStart(2, '0')
            return `${y}-${m}-${day}`
        }

        function addPeriodISO (dateISO, index, frequency) {
            const d = new Date(`${dateISO}T00:00:00`)
            if (frequency === 'weekly') {
                d.setDate(d.getDate() + (7 * index))
            } else {
                d.setMonth(d.getMonth() + index)
            }
            return d.toISOString().slice(0, 10)
        }

        function defaultLoanSystemState () {
            return {
                settings: {
                    late_fee_percent: 1,
                    grace_days: 2,
                    payment_frequency: 'monthly',
                    interest_mode: 'annual',
                    reminder_days: 2
                },
                clients: [],
                loans: [],
                payments: []
            }
        }

        function readLoanSystemState () {
            try {
                const parsed = JSON.parse(localStorage.getItem(LOAN_SYSTEM_KEY) || 'null')
                if (!parsed || typeof parsed !== 'object') return defaultLoanSystemState()
                return {
                    settings: { ...defaultLoanSystemState().settings, ...(parsed.settings || {}) },
                    clients: Array.isArray(parsed.clients) ? parsed.clients : [],
                    loans: Array.isArray(parsed.loans) ? parsed.loans : [],
                    payments: Array.isArray(parsed.payments) ? parsed.payments : []
                }
            } catch (_) {
                return defaultLoanSystemState()
            }
        }

        function writeLoanSystemState (state) {
            try {
                localStorage.setItem(LOAN_SYSTEM_KEY, JSON.stringify(state))
            } catch (_) {}
        }

        function periodicRateForLoan (loan) {
            const pct = Number(loan.interest_rate_pct) || 0
            const freq = loan.payment_frequency === 'weekly' ? 'weekly' : 'monthly'
            const mode = loan.interest_mode === 'monthly' ? 'monthly' : 'annual'
            if (mode === 'annual') return freq === 'weekly' ? (pct / 100) / 52 : (pct / 100) / 12
            return freq === 'weekly' ? (pct / 100) / 4 : (pct / 100)
        }

        function generateInstallments (loanInput) {
            const principal = Number(loanInput.principal) || 0
            const termMonths = Math.max(1, Number(loanInput.term_months) || 1)
            const frequency = loanInput.payment_frequency === 'weekly' ? 'weekly' : 'monthly'
            const periods = frequency === 'weekly' ? termMonths * 4 : termMonths
            const principalTarget = periods > 0 ? principal / periods : principal
            const out = []
            for (let i = 1; i <= periods; i++) {
                out.push({
                    n: i,
                    due_date: addPeriodISO(loanInput.start_date, i - 1, frequency),
                    principal_target: Number(principalTarget.toFixed(2)),
                    paid_interest: 0,
                    paid_principal: 0,
                    paid_late_fee: 0
                })
            }
            return out
        }

        function normalizeInstallmentRecord (inst, fallbackPrincipalTarget = 0) {
            if (inst && typeof inst === 'object') {
                return {
                    n: Number(inst.n) || 0,
                    due_date: inst.due_date,
                    principal_target: Number(inst.principal_target != null ? inst.principal_target : (inst.principal_due != null ? inst.principal_due : fallbackPrincipalTarget)) || 0,
                    paid_interest: Number(inst.paid_interest) || 0,
                    paid_principal: Number(inst.paid_principal) || 0,
                    paid_late_fee: Number(inst.paid_late_fee) || 0,
                    legacy_paid_amount: Number(inst.paid_amount) || 0
                }
            }
            return {
                n: 0,
                due_date: isoToday(),
                principal_target: Number(fallbackPrincipalTarget) || 0,
                paid_interest: 0,
                paid_principal: 0,
                paid_late_fee: 0,
                legacy_paid_amount: 0
            }
        }

        function evaluateInstallment (inst, loan, policy, remainingPrincipalAtStart, now = new Date()) {
            const due = new Date(`${inst.due_date}T00:00:00`)
            const periodRate = periodicRateForLoan(loan)
            const interestDue = Math.max(0, Number((remainingPrincipalAtStart * periodRate).toFixed(2)))
            const principalTarget = Math.max(0, Math.min(remainingPrincipalAtStart, Number(inst.principal_target) || 0))
            let paidInterest = Math.max(0, Number(inst.paid_interest) || 0)
            let paidPrincipal = Math.max(0, Number(inst.paid_principal) || 0)
            const paidLateFee = Math.max(0, Number(inst.paid_late_fee) || 0)
            const legacyPaid = Math.max(0, Number(inst.legacy_paid_amount) || 0)
            if (legacyPaid > 0 && paidInterest === 0 && paidPrincipal === 0 && paidLateFee === 0) {
                paidInterest = Math.min(legacyPaid, interestDue)
                paidPrincipal = Math.max(0, legacyPaid - paidInterest)
            }

            const pendingInterest = Math.max(0, interestDue - paidInterest)
            const pendingPrincipal = Math.max(0, principalTarget - paidPrincipal)
            const basePending = pendingInterest + pendingPrincipal

            const msDay = 1000 * 60 * 60 * 24
            const rawDaysLate = basePending > 0 ? Math.floor((now - due) / msDay) : 0
            const grace = Number(policy.grace_days) || 0
            const lateDays = Math.max(0, rawDaysLate - grace)
            const lateFeeAccrued = basePending > 0 ? basePending * ((Number(policy.late_fee_percent) || 0) / 100) * lateDays : 0
            const pendingLateFee = Math.max(0, lateFeeAccrued - paidLateFee)
            const pendingTotal = basePending + pendingLateFee

            let status = 'pendiente'
            if (pendingTotal <= 0.009) status = 'pagado'
            else if (rawDaysLate > grace) status = 'mora'
            else if (rawDaysLate > 0) status = 'atrasado'

            return {
                ...inst,
                interest_due: interestDue,
                principal_target: principalTarget,
                total_due: Number((interestDue + principalTarget).toFixed(2)),
                pending_interest: Number(pendingInterest.toFixed(2)),
                pending_principal: Number(pendingPrincipal.toFixed(2)),
                pending_late_fee: Number(pendingLateFee.toFixed(2)),
                lateFeeAccrued: Number(lateFeeAccrued.toFixed(2)),
                pendingTotal: Number(pendingTotal.toFixed(2)),
                status,
                daysLate: rawDaysLate,
                lateDays
            }
        }

        function summarizeLoan (loan, state, now = new Date()) {
            const policy = state.settings
            const rawInst = Array.isArray(loan.installments) ? loan.installments : []
            const periods = rawInst.length || Math.max(1, Number(loan.term_months) || 1)
            const fallbackTarget = periods > 0 ? (Number(loan.principal) || 0) / periods : (Number(loan.principal) || 0)
            const normalized = rawInst.length ? rawInst.map((i) => normalizeInstallmentRecord(i, fallbackTarget)) : generateInstallments({
                principal: Number(loan.principal) || 0,
                term_months: Number(loan.term_months) || 1,
                payment_frequency: loan.payment_frequency || state.settings.payment_frequency,
                start_date: loan.start_date || isoToday()
            }).map((i) => normalizeInstallmentRecord(i, fallbackTarget))

            let remainingPrincipal = Number(loan.principal) || 0
            const items = []
            for (const inst of normalized.sort((a, b) => a.n - b.n)) {
                const evaluated = evaluateInstallment(inst, loan, policy, remainingPrincipal, now)
                items.push(evaluated)
                remainingPrincipal = Math.max(0, remainingPrincipal - (Number(inst.paid_principal) || 0))
            }

            const pending = items.reduce((s, it) => s + it.pendingTotal, 0)
            const mora = items.reduce((s, it) => s + Math.max(0, it.pending_late_fee || 0), 0)
            const next = items.find((it) => it.status !== 'pagado')
            const paidCount = items.filter((it) => it.status === 'pagado').length
            const status = pending <= 0.009 ? 'finalizado' : (items.some((it) => it.status === 'mora') ? 'moroso' : 'activo')
            const paidTotal = items.reduce((s, it) => s + (Number(it.paid_interest) || 0) + (Number(it.paid_principal) || 0) + (Number(it.paid_late_fee) || 0), 0)
            const collectedInterest = items.reduce((s, it) => s + (Number(it.paid_interest) || 0), 0)
            const collectedLateFees = items.reduce((s, it) => s + (Number(it.paid_late_fee) || 0), 0)
            return {
                items,
                pending: Number(pending.toFixed(2)),
                mora: Number(mora.toFixed(2)),
                next,
                paidCount,
                status,
                paidTotal: Number(paidTotal.toFixed(2)),
                totalInstallments: items.length,
                principalOutstanding: Number(remainingPrincipal.toFixed(2)),
                collectedInterest: Number(collectedInterest.toFixed(2)),
                collectedLateFees: Number(collectedLateFees.toFixed(2))
            }
        }

        function buildAutoNotifications (state, now = new Date()) {
            const out = []
            const reminderDays = Number(state.settings.reminder_days) || 0
            const msDay = 1000 * 60 * 60 * 24
            state.loans.forEach((loan) => {
                const loanSummary = summarizeLoan(loan, state, now)
                loanSummary.items.forEach((inst) => {
                    if (inst.status === 'pagado') return
                    const due = new Date(`${inst.due_date}T00:00:00`)
                    const days = Math.ceil((due - now) / msDay)
                    if (days === reminderDays) out.push({ type: 'recordatorio', text: `Recordatorio: cuota ${inst.n} de ${loan.client_name} vence en ${days} día(s).` })
                    if (inst.status === 'atrasado') out.push({ type: 'atraso', text: `Atraso detectado: cuota ${inst.n} de ${loan.client_name} está vencida.` })
                    if (inst.status === 'mora') out.push({ type: 'mora', text: `Mora generada: cuota ${inst.n} de ${loan.client_name}, recargo ${fmtMoney(inst.lateFeeAccrued)}.` })
                })
            })
            return out.slice(0, 8)
        }

        function hydrateLoanRequestDraft () {
            const form = document.getElementById('loan-request-form')
            if (!form) return
            let draft
            try {
                draft = JSON.parse(localStorage.getItem('nexo_loan_request_draft') || 'null')
            } catch (_) {
                draft = null
            }
            if (!draft || typeof draft !== 'object') return
            Object.keys(draft).forEach((k) => {
                const el = form.elements.namedItem(k)
                const v = draft[k]
                if (!el) return
                if (el instanceof RadioNodeList) {
                    Array.from(el).forEach((r) => { r.checked = r.value === String(v) })
                } else if (el.type === 'checkbox') {
                    el.checked = v === true || v === '1' || v === 1 || v === 'on'
                } else {
                    el.value = v == null ? '' : String(v)
                }
            })
        }

            return `${p[0][0]}${p[p.length - 1][0]}`.toUpperCase()

        function exportSystemReport (type) {
            const state = getOrCreateLoanSystemState()
            const now = new Date()
            const summaries = state.loans.map((loan) => ({ loan, sum: summarizeLoan(loan, state, now) }))
            let payload = {}
            if (type === 'active-loans') payload = summaries.filter((x) => x.sum.status !== 'finalizado')
            else if (type === 'overdue-loans') payload = summaries.filter((x) => x.sum.status === 'moroso')

            else if (type === 'loans-summary') payload = summaries
            else payload = { state, generated_at: new Date().toISOString() }
            const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' })
            const a = document.createElement('a')
            a.href = URL.createObjectURL(blob)
            a.download = `nexo-${type}.json`
            a.click()
            URL.revokeObjectURL(a.href)
        }

                const recent = [...state.payments].slice(-6).reverse()
                activityFeed.innerHTML = recent.length
                    ? recent.map((p) => `<div class="loans-act-item"><div class="loans-act-item__dot loans-act-item__dot--pay" aria-hidden="true"><svg width="13" height="10" viewBox="0 0 14 10" fill="none"><path d="M1 5l4 4 8-8" stroke="currentColor" stroke-width="1.5"/></svg></div><div class="loans-act-item__title">Pago aplicado</div><div class="loans-act-item__body">${p.loan_id} · cuota ${p.installment_n} · ${fmtMoney(p.amount)}</div><div class="loans-act-item__time">${new Date(p.created_at).toLocaleString('es-DO')}</div></div>`).join('')
                    : '<p class="loans-empty-note">Sin actividad de pagos todavía.</p>'
            }

            const alertsList = root.querySelector('#loan-alerts-list')
            if (alertsList) {
                const alerts = buildAutoNotifications(state, now)
                alertsList.innerHTML = alerts.length
                    ? alerts.map((a) => `<div class="loans-act-item"><div class="loans-act-item__dot ${a.type === 'mora' ? 'loans-act-item__dot--doc' : 'loans-act-item__dot--new'}" aria-hidden="true"></div><div class="loans-act-item__body">${a.text}</div></div>`).join('')
                    : '<p class="loans-empty-note">Sin alertas activas por ahora.</p>'
            }
        }

        function ensurePortalMainDelegation () {
            const root = document.getElementById('portal-main')
            if (!root || root._nexoDelegated) return
            root._nexoDelegated = true

            root.addEventListener('click', (e) => {
                const portalNav = e.target.closest('[data-portal-view]')
                if (portalNav && root.contains(portalNav)) {
                    e.preventDefault()
                    const vid = portalNav.getAttribute('data-portal-view')
                    if (vid && PORTAL_VIEWS.has(vid)) {
                        if (portalSidebar) portalSidebar.setActiveNavOnly(vid)
                        void loadPortalView(vid, { pushState: true })
                    }
                    return
                }
                const saveDraftBtn = e.target.closest('[data-loan-save-draft]')
                if (saveDraftBtn && root.contains(saveDraftBtn)) {
                    e.preventDefault()
                    saveLoanRequestDraft()
                    return
                }
                const settingsTab = e.target.closest('[data-settings-tab]')
                if (settingsTab && root.contains(settingsTab)) {
                    e.preventDefault()
                    const pid = settingsTab.getAttribute('data-settings-tab')
                    root.querySelectorAll('[data-settings-tab]').forEach((btn) => {
                        const on = btn === settingsTab
                        btn.classList.toggle('is-active', on)
                        btn.setAttribute('aria-selected', on ? 'true' : 'false')
                    })
                    root.querySelectorAll('[data-settings-panel]').forEach((panel) => {
                        panel.hidden = panel.getAttribute('data-settings-panel') !== pid
                    })
                    return
                }
                const resetFormBtn = e.target.closest('[data-settings-reset-form]')
                if (resetFormBtn && root.contains(resetFormBtn)) {
                    e.preventDefault()
                    const fid = resetFormBtn.getAttribute('data-settings-reset-form')
                    document.getElementById(fid)?.reset()
                    hydrateSettingsView()
                    return
                }
                const clearCacheBtn = e.target.closest('[data-settings-clear-cache]')
                if (clearCacheBtn && root.contains(clearCacheBtn)) {
                    e.preventDefault()
                    if (!confirm('¿Eliminar preferencias locales guardadas en este equipo (perfil e institución)?')) return
                    try {
                        localStorage.removeItem('nexo_ui_profile')
                        localStorage.removeItem('nexo_ui_org')
                    } catch (_) {}
                    alert('Preferencias locales eliminadas.')
                    hydrateSettingsView()
                    return
                }
                const exportJsonBtn = e.target.closest('[data-settings-export-json]')
                if (exportJsonBtn && root.contains(exportJsonBtn)) {
                    e.preventDefault()
                    const blob = new Blob([JSON.stringify({
                        export: 'nexo_portal_config',
                        generated_at: new Date().toISOString(),
                        profile: readProfilePrefs(),
                        org: readOrgPrefs()
                    }, null, 2)], { type: 'application/json' })
                    const a = document.createElement('a')
                    a.href = URL.createObjectURL(blob)
                    a.download = 'nexo-config-export.json'
                    a.click()
                    URL.revokeObjectURL(a.href)
                    return
                }
                const rpt = e.target.closest('[data-report-export],[data-export-report]')
                if (rpt && root.contains(rpt)) {
                    e.preventDefault()
                    const type = rpt.getAttribute('data-report-export') || rpt.getAttribute('data-export-report') || 'full'
                    exportSystemReport(type)
                    return
                }
                if (e.target.closest('[data-go-loans]')) {
                    e.preventDefault()
                    if (portalSidebar) portalSidebar.setActiveNavOnly('loans')
                    void loadPortalView('loans', { pushState: true })
                    return
                }
                const pbtn = e.target.closest('.period-toggle__btn')
                if (pbtn && root.contains(pbtn)) {
                    root.querySelectorAll('.period-toggle__btn').forEach((b) => b.classList.remove('is-active'))
                    pbtn.classList.add('is-active')
                    return
                }
                const ap = e.target.closest('.analytics-period__btn')
                if (ap && root.contains(ap)) {
                    root.querySelectorAll('.analytics-period__btn').forEach((b) => b.classList.remove('is-active'))
                    ap.classList.add('is-active')
                }
            })

            root.addEventListener('change', (e) => {
                const t = e.target
                if (t.id === 'filter-estado' || t.id === 'filter-tipo') {
                    renderLoansView()
                    return
                }
                if (t.id === 'payment-loan-select') {
                    populatePaymentInstallmentSelect(t.value)
                }
            })

            root.addEventListener('submit', (e) => {
                const form = e.target
                if (form.id === 'loan-request-form') {
                    e.preventDefault()
                    if (!form.checkValidity()) {
                        form.reportValidity()
                        return
                    }
                    const fd = new FormData(form)
                    const payload = Object.fromEntries(fd.entries())
                    const state = getOrCreateLoanSystemState()
                    const docType = (payload.documento_tipo || '').trim()
                    const docNo = (payload.documento_numero || '').trim()
                    let client = state.clients.find((c) => c.document_type === docType && c.document_number === docNo)
                    if (!client) {
                        client = {
                            id: randomId('cli'),
                            name: payload.nombre,
                            document_type: docType,
                            document_number: docNo,
                            phone: payload.telefono,
                            address: payload.direccion,
                            email: payload.email,
                            created_at: new Date().toISOString()
                        }
                        state.clients.unshift(client)
                    } else {
                        client.name = payload.nombre || client.name
                        client.phone = payload.telefono || client.phone
                        client.address = payload.direccion || client.address
                        client.email = payload.email || client.email
                    }
                    const interestMode = payload.interest_mode || state.settings.interest_mode || 'annual'
                    const paymentFrequency = payload.payment_frequency || state.settings.payment_frequency || 'monthly'
                    const loanInput = {
                        principal: Number(String(payload.monto_solicitado || '0').replace(/[^\d.-]/g, '')),
                        term_months: Number(payload.plazo_meses) || 12,
                        interest_rate_pct: Number(payload.interes_porcentaje) || 0,
                        interest_mode: interestMode,
                        payment_frequency: paymentFrequency,
                        start_date: payload.fecha_inicio || isoToday()
                    }
                    const files = [...(form.querySelector('#lr-documents')?.files || [])].map((f) => ({
                        name: f.name,
                        size: f.size,
                        type: f.type
                    }))
                    const loan = {
                        id: randomId('loan'),
                        client_id: client.id,
                        client_name: client.name,
                        product: payload.producto || 'hipotecario',
                        purpose: payload.proposito || '',
                        principal: loanInput.principal,
                        term_months: loanInput.term_months,
                        interest_rate_pct: loanInput.interest_rate_pct,
                        interest_mode: loanInput.interest_mode,
                        payment_frequency: loanInput.payment_frequency,
                        start_date: loanInput.start_date,
                        created_at: new Date().toISOString(),
                        contract_signer: payload.contract_signer || '',
                        installments: generateInstallments(loanInput),
                        documents: files
                    }
                    state.loans.unshift(loan)
                    writeLoanSystemState(state)
                    console.info('[Nexo] Solicitud de préstamo creada', loan)
                    try {
                        localStorage.removeItem('nexo_loan_request_draft')
                    } catch (_) {}
                    alert(`Solicitud registrada. Se generaron ${loan.installments.length} cuotas automáticas para ${client.name}.`)
                    form.reset()
                    const defaultFreq = form.querySelector('#lr-payment-frequency')
                    if (defaultFreq) defaultFreq.value = state.settings.payment_frequency || 'monthly'
                    const defaultMode = form.querySelector('#lr-interest-mode')
                    if (defaultMode) defaultMode.value = state.settings.interest_mode || 'annual'
                    return
                }
                if (form.id === 'loan-payment-form') {
                    e.preventDefault()
                    if (!form.checkValidity()) {
                        form.reportValidity()
                        return
                    }
                    const fd = new FormData(form)
                    const state = getOrCreateLoanSystemState()
                    const loan = state.loans.find((l) => l.id === String(fd.get('loan_id')))
                    if (!loan) return
                    const n = Number(fd.get('installment_n'))
                    let amount = Number(fd.get('amount'))
                    const inst = (loan.installments || []).find((i) => Number(i.n) === n)
                    if (!inst || !amount || amount <= 0) return
                    const summary = summarizeLoan(loan, state)
                    const current = summary.items.find((i) => Number(i.n) === n)
                    if (!current) return
                    const toLateFee = Math.min(amount, current.pending_late_fee)
                    amount -= toLateFee
                    const toInterest = Math.min(amount, current.pending_interest)
                    amount -= toInterest
                    const toPrincipal = Math.max(0, Math.min(amount, summary.principalOutstanding))
                    inst.paid_late_fee = Number(((Number(inst.paid_late_fee) || 0) + toLateFee).toFixed(2))
                    inst.paid_interest = Number(((Number(inst.paid_interest) || 0) + toInterest).toFixed(2))
                    inst.paid_principal = Number(((Number(inst.paid_principal) || 0) + toPrincipal).toFixed(2))
                    state.payments.push({
                        id: randomId('pay'),
                        loan_id: loan.id,
                        installment_n: n,
                        amount: Number(fd.get('amount')),
                        breakdown: {
                            late_fee: Number(toLateFee.toFixed(2)),
                            interest: Number(toInterest.toFixed(2)),
                            principal: Number(toPrincipal.toFixed(2))
                        },
                        created_at: new Date().toISOString()
                    })
                    writeLoanSystemState(state)
                    alert('Pago registrado correctamente.')
                    form.reset()
                    renderLoansView()
                    renderDashboardView()
                    renderAnalyticsView()
                    renderClientsView()
                    return
                }
                if (!form.id || !form.id.startsWith('settings-form-')) return
                e.preventDefault()
                if (!form.checkValidity()) {
                    form.reportValidity()
                    return
                }
                if (form.id === 'settings-form-security') {
                    const p1 = form.querySelector('[name="password_new"]')?.value || ''
                    const p2 = form.querySelector('[name="password_confirm"]')?.value || ''
                    if (p1 !== p2) {
                        alert('Las contraseñas nuevas no coinciden.')
                        return
                    }
                    if (p1 && p1.length < 8) {
                        alert('La nueva contraseña debe tener al menos 8 caracteres.')
                        return
                    }
                }
                const fd = new FormData(form)
                const payload = Object.fromEntries(fd.entries())
                console.info('[Nexo] Configuración', form.id, payload)
                if (form.id === 'settings-form-profile') {
                    writeProfilePrefs({
                        display_name: payload.display_name,
                        job_title: payload.job_title,
                        phone: payload.phone,
                        locale: payload.locale,
                        timezone: payload.timezone,
                        bio: payload.bio
                    })
                }
                if (form.id === 'settings-form-org') writeOrgPrefs(payload)
                if (form.id === 'settings-form-notify') {
                    writeProfilePrefs({
                        notif_email_payments: !!form.querySelector('[name="notif_email_payments"]')?.checked,
                        notif_email_applications: !!form.querySelector('[name="notif_email_applications"]')?.checked,
                        notif_email_digest: !!form.querySelector('[name="notif_email_digest"]')?.checked,
                        notif_inapp: !!form.querySelector('[name="notif_inapp"]')?.checked,
                        notif_kyc: !!form.querySelector('[name="notif_kyc"]')?.checked,
                        digest_weekday: payload.digest_weekday,
                        digest_hour: payload.digest_hour
                    })
                }
                if (form.id === 'settings-form-appearance') {
                    writeProfilePrefs({
                        ui_density: form.querySelector('input[name="ui_density"]:checked')?.value || 'comfortable',
                        ui_accent: form.querySelector('input[name="ui_accent"]:checked')?.value || 'navy',
                        ui_animations: !!form.querySelector('[name="ui_animations"]')?.checked,
                        ui_reduce_motion: !!form.querySelector('[name="ui_reduce_motion"]')?.checked
                    })
                }
                if (form.id === 'settings-form-security') {
                    writeProfilePrefs({ session_timeout_min: payload.session_timeout_min })
                }
                if (form.id === 'settings-form-advanced') {
                    writeProfilePrefs({
                        debug_verbose: !!form.querySelector('[name="debug_verbose"]')?.checked,
                        client_log_level: payload.client_log_level
                    })
                }
                if (form.id === 'settings-form-credit-policy') {
                    const state = getOrCreateLoanSystemState()
                    state.settings = {
                        ...state.settings,
                        late_fee_percent: Number(payload.late_fee_percent) || 0,
                        grace_days: Number(payload.grace_days) || 0,
                        payment_frequency: payload.payment_frequency || 'monthly',
                        interest_mode: payload.interest_mode || 'annual',
                        reminder_days: Number(payload.reminder_days) || 0
                    }
                    writeLoanSystemState(state)
                }
                if (form.id === 'settings-form-data-retention') {
                    writeOrgPrefs({
                        retention_audit_months: payload.retention_audit_months,
                        retention_docs_months: payload.retention_docs_months
                    })
                }
                if (form.id === 'settings-form-privacy') writeOrgPrefs({ dpo_email: payload.dpo_email })
                alert('Cambios guardados (demostración local). Revisa la consola para el detalle.')
                if (form.id === 'settings-form-security') {
                    ;['password_current', 'password_new', 'password_confirm'].forEach((n) => {
                        const i = form.querySelector(`[name="${n}"]`)
                        if (i) i.value = ''
                    })
                }
            })
        }

        async function loadPortalView (pageId, { pushState = true } = {}) {
            const url = PORTAL_FRAGMENTS[pageId]
            if (!url) return
            const main = document.getElementById('portal-main')
            if (!main) return

            portalCurrentView = pageId
            try {
                const res = await fetch(url, { cache: 'no-store' })
                if (!res.ok) throw new Error(String(res.status))
                main.innerHTML = await res.text()
            } catch (e) {
                console.warn(e)
                main.innerHTML = '<p style="padding:24px;color:#515f74;font-family:Inter,sans-serif;">No se pudo cargar este módulo. Comprueba que los archivos en <code>fragments/</code> existan.</p>'
                return
            }

            document.title = PORTAL_TITLES[pageId] || PORTAL_TITLES.dashboard

            if (pushState) {
                try {
                    const u = new URL(window.location.href)
                    u.searchParams.set('view', pageId)
                    history.pushState({ view: pageId }, '', u.toString())
                } catch (err) {
                    console.warn('[portal] pushState', err)
                }
            }

            ensurePortalMainDelegation()

            if (pageId === 'settings') hydrateSettingsView()
            if (pageId === 'loan-request') {
                const state = getOrCreateLoanSystemState()
                const root = document.getElementById('portal-main')
                const dateEl = root?.querySelector('#lr-fecha-inicio')
                if (dateEl && !dateEl.value) dateEl.value = isoToday()
                const freqEl = root?.querySelector('#lr-payment-frequency')
                if (freqEl) freqEl.value = state.settings.payment_frequency || 'monthly'
                const modeEl = root?.querySelector('#lr-interest-mode')
                if (modeEl) modeEl.value = state.settings.interest_mode || 'annual'
                hydrateLoanRequestDraft()
            }
            if (pageId === 'dashboard') renderDashboardView()
            if (pageId === 'clients') renderClientsView()
            if (pageId === 'loans') renderLoansView()
            if (pageId === 'analytics') renderAnalyticsView()

            const dashboardLike = pageId === 'dashboard'
            if (dashboardLike) {
                const sessionLine = document.getElementById('portal-session')
                if (sessionLine && portalUserEmail) {
                    sessionLine.textContent = `Sesión como ${portalUserEmail}`
                    sessionLine.hidden = false
                }
            }
        }

        window.addEventListener('popstate', () => {
            if (!portalSidebar) return
            const v = getInitialPortalView()
            portalSidebar.setActiveNavOnly(v)
            void loadPortalView(v, { pushState: false })
        })

        window.addEventListener('DOMContentLoaded', async () => {
            const initialView = getInitialPortalView()
            getOrCreateLoanSystemState()
            wirePortalSearch()

            portalSidebar = new Sidebar({
                variant: 'portal',
                activePage: initialView,
                portalProfile: {
                    name: 'Marcus Thorne',
                    role: 'Analista senior — underwriting',
                    initials: 'MT'
                },
                onNavigate: portalNavigate
            })

            if (!window.electronAPI) return
            const result = await window.electronAPI.auth.getCurrentUser()
            if (!result.success || !result.user) {
                window.location.href = 'index.html'
                return
            }
            const u = result.user
            if (window.NexoAuth.isSuperAdmin(u)) {
                window.location.href = 'dashboard.html'
                return
            }
            if (u.company_blocked === true) {
                alert('Tu empresa está bloqueada por administración. Contacta a NEXO para reactivar el servicio.')
                await window.electronAPI.auth.signOut()
                window.location.href = 'index.html'
                return
            }
            const p = window.NexoAuth.profile(u)
            const display = p.name || p.full_name || (u.email ? u.email.split('@')[0] : '') || 'Usuario'
            const roleLine = p.job_title || p.title || p.company || 'Usuario del portal'
            portalUserEmail = u.email || ''
            nexoPortalProfile.email = portalUserEmail
            nexoPortalProfile.displayName = display
            nexoPortalProfile.company = p.company || ''
            nexoPortalProfile.roleLine = roleLine

            portalSidebar.updatePortalProfile({
                name: display,
                role: roleLine,
                initials: initialsFromName(display)
            })

            const nameEl = document.getElementById('app-header-user-name')
            const metaEl = document.getElementById('app-header-user-meta')
            const av = document.getElementById('app-header-avatar')
            if (nameEl) nameEl.textContent = display
            if (metaEl) metaEl.textContent = p.company || 'Lending Ledger'
            if (av) {
                av.textContent = initialsFromName(display)
                av.removeAttribute('aria-hidden')
                av.setAttribute('aria-label', 'Avatar')
            }

            await loadPortalView(initialView, { pushState: false })
        })

        const updateMaximizeIcon = (isMaximized) => {
            const maxIcon = document.getElementById('max-icon')
            const restoreIcon = document.getElementById('restore-icon')
            const maxBtn = document.getElementById('max-btn')
            if (!maxIcon || !restoreIcon || !maxBtn) return
            if (isMaximized) {
                maxIcon.style.display = 'none'
                restoreIcon.style.display = 'block'
                maxBtn.setAttribute('aria-label', 'Restaurar')
            } else {
                maxIcon.style.display = 'block'
                restoreIcon.style.display = 'none'
                maxBtn.setAttribute('aria-label', 'Maximizar')
            }
        }

        if (window.electronAPI) {
            window.electronAPI.onWindowMaximized(updateMaximizeIcon)
            document.getElementById('min-btn').addEventListener('click', () => window.electronAPI.minimize())
            document.getElementById('max-btn').addEventListener('click', () => window.electronAPI.maximize())
            document.getElementById('close-btn').addEventListener('click', () => window.electronAPI.close())
        }
    </script>
</body>
