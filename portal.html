            const totalPrestado = summaries.reduce((s, x) => s + (Number(x.loan.principal) || 0), 0)
            const totalCobrado = summaries.reduce((s, x) => s + x.sum.paidTotal, 0)
            const totalMora = summaries.reduce((s, x) => s + x.sum.mora, 0)
            const clientesMorosos = new Set(summaries.filter((x) => x.sum.status === 'moroso').map((x) => x.loan.client_id)).size
            const ganancias = summaries.reduce((s, x) => s + x.sum.collectedInterest + x.sum.collectedLateFees, 0)

            kpiSet('kpi-total-mora', fmtMoney(totalMora))
            kpiSet('kpi-clientes-morosos', String(clientesMorosos))
            kpiSet('kpi-ganancias', fmtMoney(ganancias))
            const count = root.querySelector('#loans-record-count')
            if (count) count.textContent = `Mostrando ${summaries.length} de ${state.loans.length} registros`

            const payLoanSel = root.querySelector('#payment-loan-select')
            if (payLoanSel) {
                payLoanSel.innerHTML = state.loans.map((l) => `<option value="${l.id}">${displayLoanRef(l)} · ${l.client_name}</option>`).join('')
                if (payLoanSel.value) populatePaymentInstallmentSelect(payLoanSel.value)

                activityFeed.innerHTML = recent.length
                    ? recent.map((p) => `<div class="loans-act-item"><div class="loans-act-item__dot loans-act-item__dot--pay" aria-hidden="true"><svg width="13" height="10" viewBox="0 0 14 10" fill="none"><path d="M1 5l4 4 8-8" stroke="currentColor" stroke-width="1.5"/></svg></div><div class="loans-act-item__title">Pago aplicado</div><div class="loans-act-item__body">${loanRefById(state, p.loan_id)} · cuota ${p.installment_n} · ${fmtMoney(p.amount)}</div><div class="loans-act-item__time">${new Date(p.created_at).toLocaleString('es-DO')}</div></div>`).join('')
                    : '<p class="loans-empty-note">Sin actividad de pagos todavía.</p>'

            const alertsList = root.querySelector('#loan-alerts-list')
            if (alertsList) {

                alertsList.innerHTML = alerts.length
                    ? alerts.map((a) => `<div class="loans-act-item"><div class="loans-act-item__dot ${a.type === 'mora' ? 'loans-act-item__dot--doc' : 'loans-act-item__dot--new'}" aria-hidden="true"></div><div class="loans-act-item__body">${a.text}</div></div>`).join('')

        }

        function ensurePortalMainDelegation () {
            const root = document.getElementById('portal-main')
            if (!root || root._nexoDelegated) return
            root._nexoDelegated = true

            root.addEventListener('input', (e) => {
                const termPanel = root.querySelector('#settings-panel-termica')
                if (!termPanel || termPanel.hidden) return
                if (e.target.closest('#settings-form-thermal-invoice') || e.target.closest('#settings-form-org')) {
                    refreshThermalInvoicePreview()
                }
            })
            root.addEventListener('change', (e) => {
                const termPanel = root.querySelector('#settings-panel-termica')
                if (!termPanel || termPanel.hidden) return
                if (e.target.closest('#settings-form-thermal-invoice') || e.target.closest('#settings-form-org')) {
                    refreshThermalInvoicePreview()
                }
            })

            root.addEventListener('click', (e) => {
                const goRegPay = e.target.closest('[data-go-register-pay]')
                if (goRegPay && root.contains(goRegPay)) {
                    e.preventDefault()
                    const presetLid = goRegPay.getAttribute('data-loan-id') || ''
                    try {
                        sessionStorage.setItem('nexo_payment_loan_preset', presetLid)
                    } catch (_) {}
                    if (portalSidebar) portalSidebar.setActiveNavOnly('loans')
                    void loadPortalView('loans', { pushState: true })
                    return
                }
                const portalNav = e.target.closest('[data-portal-view]')
                if (portalNav && root.contains(portalNav)) {
                    e.preventDefault()
                    const vid = portalNav.getAttribute('data-portal-view')
                    if (vid && PORTAL_VIEWS.has(vid)) {
                        if (portalSidebar) portalSidebar.setActiveNavOnly(vid)
                        void loadPortalView(vid, { pushState: true })
                    }
                    return
                }
                const saveDraftBtn = e.target.closest('[data-loan-save-draft]')
                if (saveDraftBtn && root.contains(saveDraftBtn)) {
                    e.preventDefault()
                    saveLoanRequestDraft()
                    return
                }
                const settingsTab = e.target.closest('[data-settings-tab]')
                if (settingsTab && root.contains(settingsTab)) {
                    e.preventDefault()
                    const pid = settingsTab.getAttribute('data-settings-tab')
                    root.querySelectorAll('[data-settings-tab]').forEach((btn) => {
                        const on = btn === settingsTab
                        btn.classList.toggle('is-active', on)
                        btn.setAttribute('aria-selected', on ? 'true' : 'false')
                    })
                    root.querySelectorAll('[data-settings-panel]').forEach((panel) => {
                        panel.hidden = panel.getAttribute('data-settings-panel') !== pid
                    })
                    if (pid === 'termica') {
                        window.requestAnimationFrame(() => hydrateThermalInvoicePanel())
                    }
                    return
                }
                const thermalPrintBtn = e.target.closest('[data-thermal-print-test]')
                if (thermalPrintBtn && root.contains(thermalPrintBtn)) {
                    e.preventDefault()
                    const NT = globalThis.NexoThermalInvoice
                    if (!NT) return
                    const org = collectOrgForThermalPreview(root)
                    const thermal = collectThermalFormLive(root)
                    const html = NT.buildThermalInvoiceHtml(org, thermal, NT.sampleReceipt())
                    void printNexoThermalHtml(html)
                    return
                }
                const resetFormBtn = e.target.closest('[data-settings-reset-form]')
                if (resetFormBtn && root.contains(resetFormBtn)) {
                    e.preventDefault()
                    const fid = resetFormBtn.getAttribute('data-settings-reset-form')
                    document.getElementById(fid)?.reset()
                    hydrateSettingsView()
                    return
                }
                const clearCacheBtn = e.target.closest('[data-settings-clear-cache]')
                if (clearCacheBtn && root.contains(clearCacheBtn)) {
                    e.preventDefault()
                    if (!confirm('¿Eliminar preferencias locales guardadas en este equipo (perfil e institución)?')) return
                    try {
                        localStorage.removeItem('nexo_ui_profile')
                        localStorage.removeItem('nexo_ui_org')
                    } catch (_) {}
                    alert('Preferencias locales eliminadas.')
                    hydrateSettingsView()
                    return
                }
                const exportJsonBtn = e.target.closest('[data-settings-export-json]')
                if (exportJsonBtn && root.contains(exportJsonBtn)) {
                    e.preventDefault()
                    const blob = new Blob([JSON.stringify({
                        export: 'nexo_portal_config',
                        generated_at: new Date().toISOString(),
                        profile: readProfilePrefs(),
                        org: readOrgPrefs()
                    }, null, 2)], { type: 'application/json' })
                    const a = document.createElement('a')
                    a.href = URL.createObjectURL(blob)
                    a.download = 'nexo-config-export.json'
                    a.click()
                    URL.revokeObjectURL(a.href)
                    return
                }
                const rpt = e.target.closest('[data-report-export],[data-export-report]')
                if (rpt && root.contains(rpt)) {
                    e.preventDefault()
                    const type = rpt.getAttribute('data-report-export') || rpt.getAttribute('data-export-report') || 'full'
                    exportSystemReport(type)
                    return
                }
                if (e.target.closest('[data-go-loans]')) {
                    e.preventDefault()
                    if (portalSidebar) portalSidebar.setActiveNavOnly('loans')
                    void loadPortalView('loans', { pushState: true })
                    return
                }
                const payFocusBtn = e.target.closest('[data-loans-focus-payment]')
                if (payFocusBtn && root.contains(payFocusBtn)) {
                    e.preventDefault()
                    focusLoanPaymentForm(root, '')
                    return
                }
                const pbtn = e.target.closest('.period-toggle__btn')
                if (pbtn && root.contains(pbtn)) {
                    root.querySelectorAll('.period-toggle__btn').forEach((b) => b.classList.remove('is-active'))
                    pbtn.classList.add('is-active')
                    renderDashboardView()
                    return
                }
                const ap = e.target.closest('.analytics-period__btn')
                if (ap && root.contains(ap)) {
                    root.querySelectorAll('.analytics-period__btn').forEach((b) => b.classList.remove('is-active'))
                    ap.classList.add('is-active')
                    renderAnalyticsView()
                    return
                }
                const loanMenuBtn = e.target.closest('.loan-menu-btn[data-loan-id]')
                if (loanMenuBtn && root.contains(loanMenuBtn)) {
                    e.preventDefault()
                    const lid = loanMenuBtn.getAttribute('data-loan-id')
                    if (lid) navigateToLoanDetail(lid)
                    return
                }
                const clientHistBtn = e.target.closest('.clients-menu-btn[data-client-id]')
                if (clientHistBtn && root.contains(clientHistBtn)) {
                    e.preventDefault()
                    const cid = clientHistBtn.getAttribute('data-client-id')
                    if (cid) openClientHistoryModal(cid)
                    return
                }
            })

            root.addEventListener('change', (e) => {
                const t = e.target
                if (t.id === 'filter-estado' || t.id === 'filter-tipo') {
                    renderLoansView()
                    return
                }
                if (t.id === 'payment-loan-select') {
                    populatePaymentInstallmentSelect(t.value)
                }
            })

            root.addEventListener('submit', async (e) => {
                const form = e.target
                if (form.id === 'loan-request-form') {
                    e.preventDefault()
                    if (!form.checkValidity()) {
                        form.reportValidity()
                        return
                    }
                    const fd = new FormData(form)
                    const payload = Object.fromEntries(fd.entries())
                    const state = getLoanState()
                    const docType = (payload.documento_tipo || '').trim()
                    const docNo = (payload.documento_numero || '').trim()
                    let client = state.clients.find((c) => c.document_type === docType && c.document_number === docNo)
                    if (!client) {
                        client = {
                            id: randomId('cli'),
                            name: payload.nombre,
                            document_type: docType,
                            document_number: docNo,
                            phone: payload.telefono,
                            address: payload.direccion,
                            email: payload.email,
                            created_at: new Date().toISOString()
                        }
                    } else {
                        client = {
                            ...client,
                            name: payload.nombre || client.name,
                            phone: payload.telefono || client.phone,
                            address: payload.direccion || client.address,
                            email: payload.email || client.email
                        }
                    }
                    const interestMode = payload.interest_mode || state.settings.interest_mode || 'annual'
                    const paymentFrequency = payload.payment_frequency || state.settings.payment_frequency || 'monthly'
                    const loanInput = {
                        principal: Number(String(payload.monto_solicitado || '0').replace(/[^\d.-]/g, '')),
                        term_months: Number(payload.plazo_meses) || 12,
                        interest_rate_pct: Number(payload.interes_porcentaje) || 0,
                        interest_mode: interestMode,
                        payment_frequency: paymentFrequency,
                        start_date: payload.fecha_inicio || isoToday()
                    }
                    const files = [...(form.querySelector('#lr-documents')?.files || [])].map((f) => ({
                        name: f.name,
                        size: f.size,
                        type: f.type
                    }))
                    const loan = {
                        id: randomId('loan'),
                        reference: nextLoanReference(state),
                        client_id: client.id,
                        client_name: client.name,
                        product: payload.producto || 'hipotecario',
                        purpose: payload.proposito || '',
                        principal: loanInput.principal,
                        term_months: loanInput.term_months,
                        interest_rate_pct: loanInput.interest_rate_pct,
                        interest_mode: loanInput.interest_mode,
                        payment_frequency: loanInput.payment_frequency,
                        start_date: loanInput.start_date,
                        created_at: new Date().toISOString(),
                        contract_signer: payload.contract_signer || '',
                        installments: generateInstallments(loanInput),
                        documents: files
                    }
                    if (!window.electronAPI?.portfolio?.createLoan) {
                        alert('No se puede guardar: API de cartera no disponible.')
                        return
                    }
                    const cr = await window.electronAPI.portfolio.createLoan({ client, loan })
                    if (!cr.success) {
                        alert(cr.error || 'No se pudo guardar el préstamo en el servidor.')
                        return
                    }
                    await refreshLoanPortfolioFromDb()
                    refreshHeaderNotificationBadge()
                    console.info('[Nexo] Préstamo creado en InsForge', loan)
                    try {
                        localStorage.removeItem('nexo_loan_request_draft')
                    } catch (_) {}
                    alert(`Préstamo creado y guardado. Se generaron ${loan.installments.length} cuotas para ${client.name}.`)
                    form.reset()
                    const st2 = getLoanState()
                    const defaultFreq = form.querySelector('#lr-payment-frequency')
                    if (defaultFreq) defaultFreq.value = st2.settings.payment_frequency || 'monthly'
                    const defaultMode = form.querySelector('#lr-interest-mode')
                    if (defaultMode) defaultMode.value = st2.settings.interest_mode || 'annual'
                    return
                }
                if (form.id === 'loan-payment-form') {
                    e.preventDefault()
                    if (!form.checkValidity()) {
                        form.reportValidity()
                        return
                    }
                    const fd = new FormData(form)
                    const state = getLoanState()
                    const loan = state.loans.find((l) => l.id === String(fd.get('loan_id')))
                    if (!loan) return
                    const n = Number(fd.get('installment_n'))
                    let amount = Number(fd.get('amount'))
                    const inst = (loan.installments || []).find((i) => Number(i.n) === n)
                    if (!inst || !amount || amount <= 0) return
                    const summary = summarizeLoan(loan, state)
                    const current = summary.items.find((i) => Number(i.n) === n)
                    if (!current) return
                    const toLateFee = Math.min(amount, current.pending_late_fee)
                    amount -= toLateFee
                    const toInterest = Math.min(amount, current.pending_interest)
                    amount -= toInterest
                    const toPrincipal = Math.max(0, Math.min(amount, summary.principalOutstanding))
                    const paidLate = Number(((Number(inst.paid_late_fee) || 0) + toLateFee).toFixed(2))
                    const paidInt = Number(((Number(inst.paid_interest) || 0) + toInterest).toFixed(2))
                    const paidPrin = Number(((Number(inst.paid_principal) || 0) + toPrincipal).toFixed(2))
                    const payment = {
                        id: randomId('pay'),
                        loan_id: loan.id,
                        installment_n: n,
                        amount: Number(fd.get('amount')),
                        breakdown: {
                            late_fee: Number(toLateFee.toFixed(2)),
                            interest: Number(toInterest.toFixed(2)),
                            principal: Number(toPrincipal.toFixed(2))
                        },
                        created_at: new Date().toISOString()
                    }
                    if (!window.electronAPI?.portfolio?.applyPayment) {
                        alert('No se puede registrar el pago: API de cartera no disponible.')
                        return
                    }
                    const pr = await window.electronAPI.portfolio.applyPayment({
                        loan_id: loan.id,
                        installment_n: n,
                        installmentPatch: {
                            paid_late_fee: paidLate,
                            paid_interest: paidInt,
                            paid_principal: paidPrin
                        },
                        payment
                    })
                    if (!pr.success) {
                        alert(pr.error || 'No se pudo registrar el pago.')
                        return
                    }
                    await refreshLoanPortfolioFromDb()
                    const NT = globalThis.NexoThermalInvoice
                    const pm = document.getElementById('portal-main')
                    if (NT && confirm('Pago registrado. ¿Imprimir comprobante térmico (58 mm) ahora?')) {
                        const org = pm ? collectOrgForThermalPreview(pm) : collectOrgForThermalPreview(document)
                        const thermal = NT.getThermalInvoiceSettings()
                        const html = NT.buildThermalInvoiceHtml(org, thermal, {
                            client_name: loan.client_name,
                            loan_reference: displayLoanRef(loan),
                            installment_n: n,
                            amount: payment.amount,
                            breakdown: payment.breakdown,
                            payment_method: 'Registro portal',
                            created_at: payment.created_at
                        })
                        await printNexoThermalHtml(html)
                    } else {
                        alert('Pago registrado correctamente.')
                    }
                    form.reset()
                    renderLoansView()
                    renderDashboardView()
                    renderAnalyticsView()
                    renderClientsView()
                    refreshHeaderNotificationBadge()
                    return
                }
                if (form.id === 'settings-form-thermal-invoice') {
                    e.preventDefault()
                    if (!form.checkValidity()) {
                        form.reportValidity()
                        return
                    }
                    const NT = globalThis.NexoThermalInvoice
                    if (!NT) {
                        alert('Módulo de factura térmica no cargado.')
                        return
                    }
                    const fd = new FormData(form)
                    NT.saveThermalInvoiceSettings({
                        document_title: String(fd.get('document_title') || '').trim(),
                        logo_url: String(fd.get('logo_url') || '').trim(),
                        institution_tax_id: String(fd.get('institution_tax_id') || '').trim(),
                        footer_line1: String(fd.get('footer_line1') || '').trim(),
                        footer_line2: String(fd.get('footer_line2') || '').trim(),
                        show_breakdown: !!form.querySelector('[name="show_breakdown"]')?.checked,
                        printerName: String(fd.get('printer_name') || '').trim()
                    })
                    alert('Configuración de factura térmica guardada en este equipo.')
                    refreshThermalInvoicePreview()
                    return
                }
                if (!form.id || !form.id.startsWith('settings-form-')) return
                e.preventDefault()
                if (!form.checkValidity()) {
                    form.reportValidity()
                    return
                }
                if (form.id === 'settings-form-security') {
                    const p1 = form.querySelector('[name="password_new"]')?.value || ''
                    const p2 = form.querySelector('[name="password_confirm"]')?.value || ''
                    if (p1 !== p2) {
                        alert('Las contraseñas nuevas no coinciden.')
                        return
                    }
                    if (p1 && p1.length < 8) {
                        alert('La nueva contraseña debe tener al menos 8 caracteres.')
                        return
                    }
                }
                const fd = new FormData(form)
                const payload = Object.fromEntries(fd.entries())
                console.info('[Nexo] Configuración', form.id, payload)
                if (form.id === 'settings-form-security') {
                    const timeoutMin = normalizeSessionTimeoutMin(payload.session_timeout_min)
                    writeProfilePrefs({ session_timeout_min: String(timeoutMin) })
                    applySessionTimeoutPolicy(timeoutMin)

                    if (window.electronAPI?.auth?.updateSecuritySettings) {
                        const persisted = await window.electronAPI.auth.updateSecuritySettings({
                            session_timeout_min: timeoutMin,
                            twofa_enabled: false
                        })
                        if (!persisted?.success) {
                            alert(persisted?.error || 'No se pudo guardar la política de inactividad en el servidor.')
                            return
                        }
                    }

                    const currentPassword = form.querySelector('[name="password_current"]')?.value || ''
                    const newPassword = form.querySelector('[name="password_new"]')?.value || ''
                    if (!newPassword) {
                        alert('Configuración de seguridad guardada.')
                        ;['password_current', 'password_new', 'password_confirm'].forEach((n) => {
                            const i = form.querySelector(`[name="${n}"]`)
                            if (i) i.value = ''
                        })
                        return
                    }
                    if (!currentPassword) {
                        alert('Debes escribir tu contraseña actual para cambiarla.')
                        return
                    }
                    if (!window.electronAPI?.auth?.requestPasswordChange || !window.electronAPI?.auth?.confirmPasswordChange) {
                        alert('La API de cambio de contraseña no está disponible.')
                        return
                    }
                    const start = await window.electronAPI.auth.requestPasswordChange(currentPassword)
                    if (!start?.success) {
                        alert(start?.error || 'No se pudo iniciar el cambio de contraseña.')
                        return
                    }
                    if (start.flow === 'link') {
                        alert('Se envió un enlace de cambio de contraseña a tu correo. Ábrelo para completar el cambio.')
                        ;['password_current', 'password_new', 'password_confirm'].forEach((n) => {
                            const i = form.querySelector(`[name="${n}"]`)
                            if (i) i.value = ''
                        })
                        return
                    }
                    const code = window.prompt('Ingresa el código recibido por correo para confirmar el cambio de contraseña:')
                    if (!code || !String(code).trim()) {
                        alert('Cambio de contraseña cancelado: no ingresaste el código de verificación.')
                        return
                    }
                    const done = await window.electronAPI.auth.confirmPasswordChange(String(code).trim(), newPassword)
                    if (!done?.success) {
                        alert(done?.error || 'No se pudo completar el cambio de contraseña.')
                        return
                    }
                    alert('Contraseña actualizada. Debes iniciar sesión nuevamente.')
                    try { await window.electronAPI.auth.signOut() } catch (_) {}
                    window.location.href = 'index.html'
                    return
                }
                if (form.id === 'settings-form-profile') {
                    writeProfilePrefs({
                        display_name: payload.display_name,
                        job_title: payload.job_title,
                        phone: payload.phone,
                        locale: payload.locale,
                        timezone: payload.timezone,
                        bio: payload.bio
                    })
                }
                if (form.id === 'settings-form-org') writeOrgPrefs(payload)
                if (form.id === 'settings-form-notify') {
                    writeProfilePrefs({
                        notif_email_payments: !!form.querySelector('[name="notif_email_payments"]')?.checked,
                        notif_email_applications: !!form.querySelector('[name="notif_email_applications"]')?.checked,
                        notif_email_digest: !!form.querySelector('[name="notif_email_digest"]')?.checked,
                        notif_inapp: !!form.querySelector('[name="notif_inapp"]')?.checked,
                        notif_kyc: !!form.querySelector('[name="notif_kyc"]')?.checked,
                        digest_weekday: payload.digest_weekday,
                        digest_hour: payload.digest_hour
                    })
                }
                if (form.id === 'settings-form-appearance') {
                    writeProfilePrefs({
                        ui_density: form.querySelector('input[name="ui_density"]:checked')?.value || 'comfortable',
                        ui_accent: form.querySelector('input[name="ui_accent"]:checked')?.value || 'navy',
                        ui_animations: !!form.querySelector('[name="ui_animations"]')?.checked,
                        ui_reduce_motion: !!form.querySelector('[name="ui_reduce_motion"]')?.checked
                    })
                }
                if (form.id === 'settings-form-advanced') {
                    writeProfilePrefs({
                        debug_verbose: !!form.querySelector('[name="debug_verbose"]')?.checked,
                        client_log_level: payload.client_log_level
                    })
                }
                if (form.id === 'settings-form-credit-policy') {
                    if (!window.electronAPI?.portfolio?.saveSettings) {
                        alert('No se puede guardar la política: API de cartera no disponible.')
                        return
                    }
                    const sv = await window.electronAPI.portfolio.saveSettings({
                        late_fee_percent: Number(payload.late_fee_percent) || 0,
                        grace_days: Number(payload.grace_days) || 0,
                        payment_frequency: payload.payment_frequency || 'monthly',
                        interest_mode: payload.interest_mode || 'annual',
                        reminder_days: Number(payload.reminder_days) || 0
                    })
                    if (!sv.success) {
                        alert(sv.error || 'No se pudo guardar la política de crédito.')
                        return
                    }
                    await refreshLoanPortfolioFromDb()
                }
                if (form.id === 'settings-form-data-retention') {
                    writeOrgPrefs({
                        retention_audit_months: payload.retention_audit_months,
                        retention_docs_months: payload.retention_docs_months
                    })
                }
                if (form.id === 'settings-form-privacy') writeOrgPrefs({ dpo_email: payload.dpo_email })
                alert('Cambios guardados.')
            })
        }

        async function loadPortalView (pageId, { pushState = true, loanId: loanIdOpt = null } = {}) {
            const url = PORTAL_FRAGMENTS[pageId]
            if (!url) return
            const main = document.getElementById('portal-main')
            if (!main) return

            let resolvedLoanId = loanIdOpt
            if (pageId === 'loan-detail') {
                if (!resolvedLoanId) {
                    try {
                        resolvedLoanId = new URL(window.location.href).searchParams.get('loanId')
                    } catch (_) {
                        resolvedLoanId = null
                    }
                }
                const stCheck = getLoanState()
                if (!resolvedLoanId || !stCheck.loans.some((l) => l.id === resolvedLoanId)) {
                    await loadPortalView('loans', { pushState: true })
                    return
                }
            }

            portalCurrentView = pageId

            if (pushState) {
                try {
                    const u = new URL(window.location.href)
                    u.searchParams.set('view', pageId)
                    if (pageId === 'loan-detail' && resolvedLoanId) u.searchParams.set('loanId', resolvedLoanId)
                    else u.searchParams.delete('loanId')
                    history.pushState({ view: pageId, loanId: pageId === 'loan-detail' ? resolvedLoanId : undefined }, '', u.toString())
                } catch (err) {
                    console.warn('[portal] pushState', err)
                }
            }

            try {
                const res = await fetch(url, { cache: 'no-store' })
                if (!res.ok) throw new Error(String(res.status))
                main.innerHTML = await res.text()
            } catch (e) {
                console.warn(e)
                main.innerHTML = '<p style="padding:24px;color:#515f74;font-family:Inter,sans-serif;">No se pudo cargar este módulo. Comprueba que los archivos en <code>fragments/</code> existan.</p>'
                return
            }

            document.title = PORTAL_TITLES[pageId] || PORTAL_TITLES.dashboard

            ensurePortalMainDelegation()

            if (pageId === 'dashboard' || pageId === 'analytics') {
                await refreshLoanPortfolioFromDb()
            }

            if (pageId === 'settings') hydrateSettingsView()
            if (pageId === 'loan-request') {
                const state = getLoanState()
                const root = document.getElementById('portal-main')
                const dateEl = root?.querySelector('#lr-fecha-inicio')
                if (dateEl && !dateEl.value) dateEl.value = isoToday()
                const freqEl = root?.querySelector('#lr-payment-frequency')
                if (freqEl) freqEl.value = state.settings.payment_frequency || 'monthly'
                const modeEl = root?.querySelector('#lr-interest-mode')
                if (modeEl) modeEl.value = state.settings.interest_mode || 'annual'
                hydrateLoanRequestDraft()
                const lrForm = document.getElementById('loan-request-form')
                if (lrForm) {
                    const onProfit = () => updateLoanProfitPreview()
                    lrForm.addEventListener('input', onProfit)
                    lrForm.addEventListener('change', onProfit)
                    updateLoanProfitPreview()
                }
            }
            if (pageId === 'dashboard') renderDashboardView()
            if (pageId === 'clients') renderClientsView()
            if (pageId === 'loans') {
                renderLoansView()
                try {
                    const preset = sessionStorage.getItem('nexo_payment_loan_preset')
                    if (preset) {
                        sessionStorage.removeItem('nexo_payment_loan_preset')
                        window.requestAnimationFrame(() => {
                            const r = document.getElementById('portal-main')
                            if (r) focusLoanPaymentForm(r, preset)
                        })
                    }
                } catch (_) {}
            }
            if (pageId === 'analytics') renderAnalyticsView()
            if (pageId === 'loan-detail') hydrateLoanDetailView(resolvedLoanId)

            const dashboardLike = pageId === 'dashboard'
            if (dashboardLike) {
                const sessionLine = document.getElementById('portal-session')
                if (sessionLine && portalUserEmail) {
                    sessionLine.textContent = `Sesión como ${portalUserEmail}`
                    sessionLine.hidden = false
                }
            }

            if (portalSidebar) {
                const navHighlight = pageId === 'loan-detail' ? 'loans' : pageId
                portalSidebar.setActiveNavOnly(navHighlight)
            }
            refreshHeaderNotificationBadge()
        }

        window.addEventListener('popstate', () => {
            if (!portalSidebar) return
            void loadPortalView(getInitialPortalView(), { pushState: false })
        })

        window.addEventListener('DOMContentLoaded', async () => {
            const initialView = getInitialPortalView()
            wirePortalSearch()
            wireClientHistoryDialog()
            wireHeaderNotifications()
            refreshHeaderNotificationBadge()
            wireAppUpdaterActions()
            const stopUpdateEvents = wireAppUpdaterEvents()

            portalSidebar = new Sidebar({
                variant: 'portal',
                activePage: initialView === 'loan-detail' ? 'loans' : initialView,
                onNavigate: portalNavigate
            })

            if (!window.electronAPI) return
            const result = await window.electronAPI.auth.getCurrentUser()
            if (!result.success || !result.user) {
                window.location.href = 'index.html'
                return
            }
            const u = result.user
            if (window.NexoAuth.isSuperAdmin(u)) {
                window.location.href = 'dashboard.html'
                return
            }
            if (u.company_blocked === true) {
                alert('Tu empresa está bloqueada por administración. Contacta a NEXO para reactivar el servicio.')
                await window.electronAPI.auth.signOut()
                window.location.href = 'index.html'
                return
            }
            const p = window.NexoAuth.profile(u)
            const display = p.name || p.full_name || (u.email ? u.email.split('@')[0] : '') || 'Usuario'
            const roleLine = p.job_title || p.title || p.company || 'Usuario del portal'
            portalUserEmail = u.email || ''
            nexoPortalProfile.email = portalUserEmail
            nexoPortalProfile.displayName = display
            nexoPortalProfile.company = p.company || ''
            nexoPortalProfile.roleLine = roleLine
            if (p.session_timeout_min !== undefined && p.session_timeout_min !== null) {
                nexoPortalProfile.securityTimeoutMin = normalizeSessionTimeoutMin(p.session_timeout_min)
                writeProfilePrefs({ session_timeout_min: String(nexoPortalProfile.securityTimeoutMin) })
            } else {
                nexoPortalProfile.securityTimeoutMin = null
            }
            applySessionTimeoutPolicy(
                nexoPortalProfile.securityTimeoutMin != null
                    ? nexoPortalProfile.securityTimeoutMin
                    : readProfilePrefs().session_timeout_min
            )

            portalSidebar.updatePortalProfile({
                name: display,
                role: roleLine,
                initials: initialsFromName(display)
            })

            const nameEl = document.getElementById('app-header-user-name')
            const metaEl = document.getElementById('app-header-user-meta')
            const av = document.getElementById('app-header-avatar')
            if (nameEl) nameEl.textContent = display
            if (metaEl) metaEl.textContent = p.company || 'Lending Ledger'
            if (av) {
                av.textContent = initialsFromName(display)
                av.removeAttribute('aria-hidden')
                av.setAttribute('aria-label', 'Avatar')
            }

            await maybeImportLegacyLoanLocalStorage()
            const loadRes = await refreshLoanPortfolioFromDb()
            if (!loadRes.success && loadRes.error) {
                console.warn('[Nexo cartera]', loadRes.error)
            }

            await hydrateAppUpdaterState()
            if (window.electronAPI?.checkForUpdates && appUpdateUi.phase !== 'ready' && appUpdateUi.phase !== 'unsupported') {
                window.electronAPI.checkForUpdates()
            }

            await loadPortalView(initialView, { pushState: false })

            window.addEventListener('beforeunload', () => {
                try { stopUpdateEvents?.() } catch (_) {}
            }, { once: true })
        })

        const updateMaximizeIcon = (isMaximized) => {
            const maxIcon = document.getElementById('max-icon')
            const restoreIcon = document.getElementById('restore-icon')
            const maxBtn = document.getElementById('max-btn')
            if (!maxIcon || !restoreIcon || !maxBtn) return
            if (isMaximized) {
                maxIcon.style.display = 'none'
                restoreIcon.style.display = 'block'
                maxBtn.setAttribute('aria-label', 'Restaurar')
            } else {
                maxIcon.style.display = 'block'
                restoreIcon.style.display = 'none'
                maxBtn.setAttribute('aria-label', 'Maximizar')
            }
        }

        if (window.electronAPI) {
            window.electronAPI.onWindowMaximized(updateMaximizeIcon)
            document.getElementById('min-btn').addEventListener('click', () => window.electronAPI.minimize())
            document.getElementById('max-btn').addEventListener('click', () => window.electronAPI.maximize())
            document.getElementById('close-btn').addEventListener('click', () => window.electronAPI.close())
        }
    </script>
