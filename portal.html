<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="components/paint-first.css">
    <title>Lending Ledger — Portal</title>
    <link rel="icon" type="image/x-icon" href="Logo.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="components/sidebar.css">
    <link rel="stylesheet" href="components/app-header.css">
    <link rel="stylesheet" href="components/dashboard-canvas.css">
    <link rel="stylesheet" href="components/portal-loans-canvas.css">
    <link rel="stylesheet" href="components/portal-analytics.css">
    <link rel="stylesheet" href="components/portal-clients.css">
    <link rel="stylesheet" href="components/portal-loan-request.css">
    <link rel="stylesheet" href="components/portal-settings.css">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        html { height: 100%; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #f9f9ff 0%, #ffffff 100%);
            color: #000e24;
            overflow-x: hidden;
            overflow-y: auto;
            width: 100%;
            min-height: 100%;
            min-height: 100dvh;
        }
        .titlebar {
            -webkit-app-region: drag;
            height: 32px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 8px;
            position: fixed;
            top: 0;
            left: var(--sidebar-width, 256px);
            right: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(196, 198, 208, 0.3);
        }
        .titlebar .window-controls { display: flex; margin-right: -8px; }
        .titlebar button {
            -webkit-app-region: no-drag;
            cursor: default;
            width: 46px;
            height: 32px;
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #515f74;
            transition: background 0.1s;
        }
        .titlebar button:hover { background: rgba(0, 0, 0, 0.05); }
        .titlebar button.close:hover { background: #e81123; color: white; }
        .main-content {
            padding: 118px clamp(16px, 4vw, 32px) 32px;
            min-height: 100vh;
            min-height: 100dvh;
            box-sizing: border-box;
        }
        .portal-welcome {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            padding: clamp(24px, 4vw, 40px);
            max-width: 42rem;
            box-shadow: 0 32px 64px -16px rgba(0, 14, 36, 0.06);
        }
        .portal-welcome h1 {
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
            font-size: clamp(1.35rem, 3vw, 1.75rem);
            margin-bottom: 12px;
        }
        .portal-welcome p {
            color: #515f74;
            line-height: 1.55;
            margin-bottom: 16px;
        }
        .portal-welcome a {
            color: #000e24;
            font-weight: 600;
        }
        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
        .portal-search-results[hidden] { display: none; }
        .portal-search-results {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            z-index: 1200;
            background: #ffffff;
            border: 1px solid rgba(0, 14, 36, 0.12);
            border-radius: 12px;
            box-shadow: 0 22px 48px rgba(0, 14, 36, 0.2);
            overflow: hidden;
            max-height: min(56vh, 420px);
            overflow-y: auto;
        }
        .portal-search-results__empty {
            padding: 14px 16px;
            color: #6b7891;
            font-size: 13px;
        }
        .portal-search-results__item {
            width: 100%;
            border: none;
            border-bottom: 1px solid #edf2ff;
            background: #fff;
            text-align: left;
            padding: 10px 12px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .portal-search-results__item:last-child { border-bottom: none; }
        .portal-search-results__item:hover {
            background: #f3f6ff;
        }
        .portal-search-results__title {
            color: #0f1f3b;
            font-size: 13px;
            font-weight: 700;
        }
        .portal-search-results__meta {
            color: #5b6880;
            font-size: 12px;
        }
        .app-header__notif-wrap {
            position: relative;
        }
        .app-header__notif-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            min-width: 18px;
            height: 18px;
            padding: 0 5px;
            border-radius: 999px;
            background: #ba1a1a;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 700;
            line-height: 18px;
            text-align: center;
            pointer-events: none;
        }
        .app-header__notif-badge[hidden] {
            display: none;
        }
        .portal-header-notifications[hidden] {
            display: none;
        }
        .portal-header-notifications {
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            width: min(100vw - 24px, 360px);
            z-index: 1250;
            background: #ffffff;
            border: 1px solid rgba(0, 14, 36, 0.12);
            border-radius: 12px;
            box-shadow: 0 22px 48px rgba(0, 14, 36, 0.2);
            max-height: min(70vh, 440px);
            overflow-y: auto;
        }
        .portal-header-notifications__head {
            padding: 12px 14px 8px;
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
            font-size: 13px;
            color: #000e24;
            border-bottom: 1px solid #edf2ff;
        }
        .portal-header-notifications__empty {
            padding: 16px 14px;
            color: #6b7891;
            font-size: 13px;
            line-height: 1.45;
        }
        .portal-header-notifications__item {
            width: 100%;
            border: none;
            border-bottom: 1px solid #edf2ff;
            background: #fff;
            text-align: left;
            padding: 12px 14px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
        }
        .portal-header-notifications__item:last-child {
            border-bottom: none;
        }
        .portal-header-notifications__item:hover {
            background: #f3f6ff;
        }
        .portal-header-notifications__title {
            color: #0f1f3b;
            font-size: 14px;
            font-weight: 700;
        }
        .portal-header-notifications__amount {
            color: #000e24;
            font-size: 13px;
            font-weight: 600;
        }
        .portal-header-notifications__meta {
            font-size: 12px;
            color: #5b6880;
        }
        .portal-header-notifications__meta--warn {
            color: #93000a;
            font-weight: 600;
        }
        .portal-header-notifications__pill {
            display: inline-block;
            margin-top: 2px;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            background: #ffdad6;
            color: #93000a;
        }
        .app-update-card {
            position: fixed;
            right: 20px;
            bottom: 18px;
            width: min(360px, calc(100vw - 28px));
            z-index: 2200;
            border-radius: 14px;
            border: 1px solid #d8e3fb;
            background: #ffffff;
            box-shadow: 0 16px 40px rgba(0, 14, 36, 0.2);
            padding: 14px;
            display: none;
        }
        .app-update-card.is-visible {
            display: block;
        }
        .app-update-card__title {
            font-family: 'Manrope', sans-serif;
            font-size: 16px;
            font-weight: 800;
            color: #001a38;
            margin-bottom: 6px;
        }
        .app-update-card__meta {
            font-size: 13px;
            color: #4f5c72;
            line-height: 1.45;
        }
        .app-update-progress {
            margin-top: 12px;
            background: #e9eef8;
            border-radius: 999px;
            overflow: hidden;
            height: 8px;
        }
        .app-update-progress__bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00357a, #85f8c4);
            transition: width 0.2s ease-out;
        }
        .app-update-card__row {
            margin-top: 12px;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            flex-wrap: wrap;
        }
        .app-update-btn {
            border: 0;
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
        }
        .app-update-btn--ghost {
            background: #edf1fa;
            color: #29405f;
        }
        .app-update-btn--primary {
            background: #00234b;
            color: #fff;
        }
        .app-update-btn[disabled] {
            opacity: 0.45;
            cursor: not-allowed;
        }
        @media (max-width: 900px) {
            .titlebar { left: 0; }
            .main-content {
                padding-top: 118px;
                padding-left: clamp(12px, 3vw, 16px);
                padding-right: clamp(12px, 3vw, 16px);
            }
        }
    </style>
</head>
<body>
    <div class="titlebar">
        <div class="window-controls">
            <button id="min-btn" type="button" aria-label="Minimizar">
                <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="5" width="10" height="1" fill="currentColor"/></svg>
            </button>
            <button id="max-btn" type="button" aria-label="Maximizar">
                <svg id="max-icon" width="12" height="12" viewBox="0 0 12 12" style="display: block;"><rect x="1" y="1" width="10" height="10" fill="none" stroke="currentColor" stroke-width="1"/></svg>
                <svg id="restore-icon" width="12" height="12" viewBox="0 0 12 12" style="display: none;"><rect x="1" y="3" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1"/><polyline points="3 3 3 1 11 1 11 9" fill="none" stroke="currentColor" stroke-width="1"/></svg>
            </button>
            <button id="close-btn" type="button" class="close" aria-label="Cerrar">
                <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1L11 11M11 1L1 11" stroke="currentColor" stroke-width="1"/></svg>
            </button>
        </div>
    </div>

    <header class="app-header" data-node-id="1:280" aria-label="Barra superior">
        <div class="app-header__search-wrap">
            <span class="app-header__search-icon" aria-hidden="true">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/>
                </svg>
            </span>
            <input type="search" class="app-header__search" id="app-header-search" placeholder="Buscar préstamos, clientes o solicitudes…" autocomplete="off" aria-label="Buscar en el portal">
            <div class="portal-search-results" id="portal-search-results" hidden aria-label="Resultados de búsqueda"></div>
        </div>
        <div class="app-header__actions">
            <div class="app-header__icon-btns">
                <div class="app-header__notif-wrap">
                    <button type="button" class="app-header__icon-btn" id="app-header-notif-btn" aria-label="Notificaciones de cobranza" aria-expanded="false" aria-haspopup="menu" aria-controls="portal-header-notifications">
                        <svg width="16" height="20" viewBox="0 0 16 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M8 2C5.2 2 3 4.2 3 7v4l-2 2v1h14v-1l-2-2V7c0-2.8-2.2-5-5-5z"/>
                            <path d="M5.5 16a2.5 2.5 0 005 0"/>
                        </svg>
                        <span class="app-header__notif-badge" id="app-header-notif-badge" hidden aria-live="polite">0</span>
                    </button>
                    <div class="portal-header-notifications" id="portal-header-notifications" hidden role="menu" aria-label="Clientes con saldo pendiente"></div>
                </div>
            </div>
            <div class="app-header__divider" aria-hidden="true"></div>
            <div class="app-header__user">
                <div class="app-header__user-text">
                    <span class="app-header__user-name" id="app-header-user-name">Portal</span>
                    <span class="app-header__user-meta" id="app-header-user-meta">Lending Ledger</span>
                </div>
                <div class="app-header__avatar" id="app-header-avatar" aria-hidden="true">LL</div>
            </div>
        </div>
    </header>

    <div class="main-content">
        <div id="portal-main" class="portal-main-root"></div>
    </div>

    <dialog id="client-history-dialog" class="loan-installments-dialog client-history-dialog" aria-labelledby="client-history-dialog-title">
        <div class="loan-installments-dialog__panel" role="document">
            <header class="loan-installments-dialog__head">
                <div class="loan-installments-dialog__head-text">
                    <h2 id="client-history-dialog-title" class="loan-installments-dialog__title">Historial del cliente</h2>
                    <p id="client-history-dialog-sub" class="loan-installments-dialog__sub"></p>
                </div>
                <button type="button" class="loan-installments-dialog__close" id="client-history-dialog-close" aria-label="Cerrar historial">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M1 1l12 12M13 1L1 13"/></svg>
                </button>
            </header>
            <div id="client-history-dialog-body" class="loan-installments-dialog__body"></div>
        </div>
    </dialog>

    <aside id="app-update-card" class="app-update-card" aria-live="polite" aria-label="Actualizaciones de la aplicación">
        <div class="app-update-card__title" id="app-update-title">Actualización disponible</div>
        <div class="app-update-card__meta" id="app-update-meta"></div>
        <div class="app-update-progress" id="app-update-progress" hidden>
            <div class="app-update-progress__bar" id="app-update-progress-bar"></div>
        </div>
        <div class="app-update-card__row">
            <button type="button" class="app-update-btn app-update-btn--ghost" id="app-update-secondary-btn"></button>
            <button type="button" class="app-update-btn app-update-btn--primary" id="app-update-primary-btn"></button>
        </div>
    </aside>

    <script src="components/auth-roles.js"></script>
    <script src="components/sidebar.js"></script>
    <script src="thermal-invoice.js"></script>
    <script>
        const PORTAL_VIEWS = new Set(['dashboard', 'loans', 'loan-detail', 'analytics', 'clients', 'loan-request', 'settings'])
        const PORTAL_FRAGMENTS = {
            dashboard: 'fragments/empresa-dashboard-inner.html',
            loans: 'fragments/portal-loans-inner.html',
            'loan-detail': 'fragments/portal-loan-detail-inner.html',
            analytics: 'fragments/portal-analytics-inner.html',
            clients: 'fragments/portal-clients-inner.html',
            'loan-request': 'fragments/portal-loan-request-inner.html',
            settings: 'fragments/portal-settings-inner.html'
        }
        const PORTAL_TITLES = {
            dashboard: 'Lending Ledger — Portal',
            loans: 'Lending Ledger — Préstamos',
            'loan-detail': 'Lending Ledger — Detalle de préstamo',
            analytics: 'Lending Ledger — Análisis',
            clients: 'Lending Ledger — Clientes',
            'loan-request': 'Lending Ledger — Nuevo préstamo',
            settings: 'Lending Ledger — Configuración'
        }

        function getInitialPortalView () {
            try {
                const u = new URL(window.location.href)
                let v = u.searchParams.get('view')
                if (v === 'documents') v = 'loan-request'
                if (v === 'loan-detail' && !u.searchParams.get('loanId')) return 'loans'
                if (v && PORTAL_VIEWS.has(v)) return v
            } catch (_) {}
            return 'dashboard'
        }

        function portalNavigate (pageId) {
            void loadPortalView(pageId, { pushState: true })
        }

        function initialsFromName (name) {
            const parts = name.trim().split(/\s+/).filter(Boolean)
            if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase()
            return name.slice(0, 2).toUpperCase() || 'LL'
        }

        let portalSidebar = null
        let portalUserEmail = ''
        let portalCurrentView = 'dashboard'
        const nexoPortalProfile = { email: '', displayName: '', company: '', roleLine: '', securityTimeoutMin: null }
        const inactivityLogoutState = {
            timerId: null,
            timeoutMin: 30,
            wired: false,
            hasTriggered: false
        }
        const PORTAL_SEARCH_INDEX = [
            { id: 'dash', title: 'Dashboard general', meta: 'KPIs, cartera y próximos pagos', view: 'dashboard', keywords: 'inicio resumen panel principal' },
            { id: 'loans-list', title: 'Préstamos', meta: 'Ver cartera y estados de préstamo', view: 'loans', keywords: 'cartera cuotas mora pagos' },
            { id: 'loans-pay', title: 'Registrar pago', meta: 'Aplicar pago a cuota (mora, interés, capital)', view: 'loans', focusSelector: '#loan-payment-form', keywords: 'abono capital interes mora cuota' },
            { id: 'clients', title: 'Clientes', meta: 'Directorio de clientes y estado', view: 'clients', keywords: 'personas cedula telefono historial' },
            { id: 'new-loan', title: 'Nuevo préstamo', meta: 'Crear préstamo y guardar en cartera', view: 'loan-request', focusSelector: '#loan-request-form', keywords: 'solicitud crear prestamo nuevo borrador' },
            { id: 'analytics', title: 'Análisis', meta: 'Reportes y métricas', view: 'analytics', keywords: 'reportes ganancias morosos exportar' },
            { id: 'settings-account', title: 'Configuración · Cuenta y perfil', meta: 'Nombre, correo, teléfono, idioma', view: 'settings', settingsTab: 'cuenta', keywords: 'perfil cuenta usuario idioma zona horaria' },
            { id: 'settings-org', title: 'Configuración · Institución', meta: 'Datos legales, sector, contacto', view: 'settings', settingsTab: 'institucion', keywords: 'empresa institucion razon social direccion slug' },
            { id: 'settings-thermal', title: 'Configuración · Factura térmica 58 mm', meta: 'Comprobante de cobro e impresora', view: 'settings', settingsTab: 'termica', keywords: 'termica 58 impresora ticket recibo comprobante' },
            { id: 'settings-notify', title: 'Configuración · Notificaciones', meta: 'Correos y avisos', view: 'settings', settingsTab: 'notificaciones', keywords: 'recordatorio aviso correo campana notificacion' },
            { id: 'settings-security', title: 'Configuración · Seguridad', meta: 'Contraseña y sesión', view: 'settings', settingsTab: 'seguridad', keywords: 'password seguridad sesion timeout' },
            { id: 'settings-appearance', title: 'Configuración · Apariencia', meta: 'Tema, densidad, acento', view: 'settings', settingsTab: 'apariencia', keywords: 'tema apariencia animaciones color interfaz' },
            { id: 'settings-data', title: 'Configuración · Datos y privacidad', meta: 'Retención y privacidad', view: 'settings', settingsTab: 'datos', keywords: 'datos privacidad retencion dpo exportar' },
            { id: 'settings-credit', title: 'Configuración · Políticas de crédito', meta: 'Mora, días de gracia, frecuencia, interés', view: 'settings', settingsTab: 'avanzado', focusSelector: '#settings-form-credit-policy', keywords: 'mora gracia interes frecuencia credito politicas' }
        ]

        const appUpdateUi = {
            phase: 'idle',
            version: null,
            percent: 0,
            accepted: false,
            errorDetail: ''
        }

        function extractUpdateErrorDetail (payload) {
            if (!payload) return ''
            if (typeof payload === 'string') return payload.trim()
            if (typeof payload === 'object') {
                if (payload.message) return String(payload.message).trim()
                if (payload.error) return String(payload.error).trim()
            }
            return ''
        }

        function renderAppUpdateCard () {
            const card = document.getElementById('app-update-card')
            const title = document.getElementById('app-update-title')
            const meta = document.getElementById('app-update-meta')
            const progress = document.getElementById('app-update-progress')
            const progressBar = document.getElementById('app-update-progress-bar')
            const primary = document.getElementById('app-update-primary-btn')
            const secondary = document.getElementById('app-update-secondary-btn')
            if (!card || !title || !meta || !progress || !progressBar || !primary || !secondary) return

            const v = appUpdateUi.version ? `v${appUpdateUi.version}` : 'nueva versión'
            const phase = appUpdateUi.phase
            let visible = false

            progress.hidden = true
            progressBar.style.width = `${Math.max(0, Math.min(100, appUpdateUi.percent || 0))}%`
            secondary.hidden = false
            secondary.disabled = false
            primary.disabled = false

            if (phase === 'available') {
                visible = true
                title.textContent = `Hay una actualización (${v})`
                meta.textContent = 'Se detectó una nueva versión. Si aceptas, inicia la descarga en segundo plano.'
                primary.textContent = 'Aceptar'
                secondary.textContent = 'Más tarde'
            } else if (phase === 'downloading') {
                visible = true
                title.textContent = `Descargando ${v}`
                meta.textContent = `Progreso ${Math.round(appUpdateUi.percent || 0)}%. Puedes seguir usando la app.`
                progress.hidden = false
                primary.textContent = 'Descargando…'
                primary.disabled = true
                secondary.textContent = 'Ocultar'
            } else if (phase === 'ready') {
                visible = true
                title.textContent = `Listo para actualizar (${v})`
                meta.textContent = 'La actualización ya se descargó. No volverá a descargarse al abrir de nuevo.'
                progress.hidden = false
                progressBar.style.width = '100%'
                primary.textContent = 'Actualizar ahora'
                secondary.textContent = 'Después'
            } else if (phase === 'error') {
                visible = true
                title.textContent = 'No se pudo actualizar'
                const detail = String(appUpdateUi.errorDetail || '').trim()
                const shortDetail = detail ? detail.slice(0, 220) : ''
                meta.textContent = shortDetail
                    ? `Hubo un problema al buscar o descargar la actualización. Detalle: ${shortDetail}`
                    : 'Hubo un problema al buscar o descargar la actualización.'
                primary.textContent = 'Reintentar'
                secondary.textContent = 'Cerrar'
            }

            card.classList.toggle('is-visible', visible)
        }

        function setAppUpdatePhase (phase, extra = {}) {
            appUpdateUi.phase = phase
            if (extra.version !== undefined) appUpdateUi.version = extra.version
            if (extra.percent !== undefined) appUpdateUi.percent = Number(extra.percent) || 0
            if (extra.accepted !== undefined) appUpdateUi.accepted = !!extra.accepted
            if (extra.errorDetail !== undefined) appUpdateUi.errorDetail = String(extra.errorDetail || '')
            if (phase !== 'error' && extra.errorDetail === undefined) appUpdateUi.errorDetail = ''
            renderAppUpdateCard()
        }

        async function hydrateAppUpdaterState () {
            const api = window.electronAPI
            if (!api?.getUpdateState) return
            try {
                const state = await api.getUpdateState()
                if (!state || typeof state !== 'object') return
                if (state.remoteVersion) appUpdateUi.version = String(state.remoteVersion)
                if (state.downloadedVersion) appUpdateUi.version = String(state.downloadedVersion)
                if (state.phase === 'ready') {
                    setAppUpdatePhase('ready', { percent: 100 })
                } else if (state.phase === 'downloading') {
                    setAppUpdatePhase('downloading', { percent: Number(state.percent) || 0 })
                } else if (state.phase === 'available') {
                    setAppUpdatePhase('available', { accepted: false, percent: 0 })
                } else if (state.phase === 'error') {
                    setAppUpdatePhase('error', { errorDetail: state.error || '' })
                } else if (state.phase === 'unsupported') {
                    setAppUpdatePhase('idle')
                }
            } catch (_) {}
        }

        function wireAppUpdaterEvents () {
            const api = window.electronAPI
            if (!api?.onUpdateEvents) return () => {}
            return api.onUpdateEvents({
                onChecking: () => {},
                onUpdateAvailable: (info) => {
                    setAppUpdatePhase('available', {
                        version: info?.version ? String(info.version) : appUpdateUi.version,
                        accepted: false,
                        percent: 0
                    })
                },
                onUpdateNotAvailable: () => {
                    if (appUpdateUi.phase !== 'ready') setAppUpdatePhase('idle')
                },
                onDownloadProgress: (p) => {
                    setAppUpdatePhase('downloading', {
                        percent: Number(p?.percent) || 0
                    })
                },
                onUpdateDownloaded: (info) => {
                    setAppUpdatePhase('ready', {
                        version: info?.version ? String(info.version) : appUpdateUi.version,
                        percent: 100
                    })
                },
                onUpdateError: (payload) => {
                    const detail = extractUpdateErrorDetail(payload)
                    console.error('[updater:renderer:error]', payload)
                    if (appUpdateUi.phase !== 'ready') setAppUpdatePhase('error', { errorDetail: detail })
                }
            })
        }

        function wireAppUpdaterActions () {
            const card = document.getElementById('app-update-card')
            const primary = document.getElementById('app-update-primary-btn')
            const secondary = document.getElementById('app-update-secondary-btn')
            if (!card || !primary || !secondary || card.dataset.wired === '1') return
            card.dataset.wired = '1'

            primary.addEventListener('click', () => {
                const api = window.electronAPI
                if (!api) return
                if (appUpdateUi.phase === 'available') {
                    setAppUpdatePhase('downloading', { accepted: true, percent: 0 })
                    api.downloadUpdate?.()
                    return
                }
                if (appUpdateUi.phase === 'ready') {
                    api.installUpdate?.()
                    return
                }
                if (appUpdateUi.phase === 'error') {
                    setAppUpdatePhase('idle')
                    api.checkForUpdates?.()
                }
            })

            secondary.addEventListener('click', () => {
                if (appUpdateUi.phase === 'downloading') {
                    card.classList.remove('is-visible')
                    return
                }
                if (appUpdateUi.phase === 'ready') {
                    card.classList.remove('is-visible')
                    return
                }
                setAppUpdatePhase('idle')
            })
        }

        function armInactivityTimer () {
            if (inactivityLogoutState.timerId) {
                window.clearTimeout(inactivityLogoutState.timerId)
                inactivityLogoutState.timerId = null
            }
            if (inactivityLogoutState.timeoutMin <= 0) return
            inactivityLogoutState.timerId = window.setTimeout(() => {

            }, inactivityLogoutState.timeoutMin * 60 * 1000)
        }

            inactivityLogoutState.wired = true
            const markActivity = () => {

                armInactivityTimer()
            }
            ;['mousedown', 'keydown', 'mousemove', 'scroll', 'touchstart', 'focus'].forEach((ev) => {
                window.addEventListener(ev, markActivity, { passive: true })
            })
        }

        function nextLoanReference (state) {
            const nums = (state.loans || []).map((l) => {
                const m = String(l.reference || '').match(/^CR-(\d+)$/i)
                return m ? parseInt(m[1], 10) : 0
            })
            const next = (nums.length ? Math.max(...nums, 0) : 0) + 1
            return `CR-${String(next).padStart(5, '0')}`
        }

        function ensureLoanReferences (state) {
            if (!Array.isArray(state.loans) || !state.loans.length) return false
            const needs = state.loans.some((l) => !String(l.reference || '').trim())
            if (!needs) return false
            let seq = state.loans.reduce((m, l) => {
                const x = String(l.reference || '').match(/^CR-(\d+)$/i)
                return x ? Math.max(m, parseInt(x[1], 10)) : m
            }, 0)
            const ordered = [...state.loans].sort((a, b) => String(a.created_at || '').localeCompare(String(b.created_at || '')))
            let changed = false
            for (const l of ordered) {
                if (String(l.reference || '').trim()) continue
                seq += 1
                l.reference = `CR-${String(seq).padStart(5, '0')}`
                changed = true
            }
            return changed
        }

        function isoToday () {
            const d = new Date()
            const y = d.getFullYear()
            const m = String(d.getMonth() + 1).padStart(2, '0')
            const day = String(d.getDate()).padStart(2, '0')

        function addPeriodISO (dateISO, index, frequency) {
            const d = new Date(`${dateISO}T00:00:00`)
            if (frequency === 'weekly') {
                d.setDate(d.getDate() + (7 * index))
            } else {
                d.setMonth(d.getMonth() + index)
            }
            return d.toISOString().slice(0, 10)
        }

        function defaultLoanSystemState () {
            return {
                settings: {
                    late_fee_percent: 1,
                    grace_days: 2,
                    payment_frequency: 'monthly',
                    interest_mode: 'annual',
                    reminder_days: 2
                },
                clients: [],
                loans: [],
                payments: []
            }
        }

        function periodicRateForLoan (loan) {
            const pct = Number(loan.interest_rate_pct) || 0
            const freq = loan.payment_frequency === 'weekly' ? 'weekly' : 'monthly'
            const mode = loan.interest_mode === 'monthly' ? 'monthly' : 'annual'
            if (mode === 'annual') return freq === 'weekly' ? (pct / 100) / 52 : (pct / 100) / 12
            return freq === 'weekly' ? (pct / 100) / 4 : (pct / 100)
        }

        function generateInstallments (loanInput) {
            const principal = Number(loanInput.principal) || 0
            const termMonths = Math.max(1, Number(loanInput.term_months) || 1)
            const frequency = loanInput.payment_frequency === 'weekly' ? 'weekly' : 'monthly'
            const periods = frequency === 'weekly' ? termMonths * 4 : termMonths
            const principalTarget = periods > 0 ? principal / periods : principal
            const out = []
            for (let i = 1; i <= periods; i++) {
                out.push({
                    n: i,
                    due_date: addPeriodISO(loanInput.start_date, i - 1, frequency),
                    principal_target: Number(principalTarget.toFixed(2)),
                    paid_interest: 0,
                    paid_principal: 0,
                    paid_late_fee: 0
                })
            }
            return out
        }

        function estimateScheduledInterestTotal (loanInput) {
            const principal = Number(loanInput.principal) || 0
            if (principal <= 0) return null
            const installments = generateInstallments(loanInput)
            if (!installments.length) return null
            const loan = {
                principal,
                term_months: Number(loanInput.term_months) || 1,
                interest_rate_pct: Number(loanInput.interest_rate_pct) || 0,
                interest_mode: loanInput.interest_mode || 'annual',
                payment_frequency: loanInput.payment_frequency || 'monthly',
                start_date: loanInput.start_date || isoToday()
            }
            const periodRate = periodicRateForLoan(loan)
            let remaining = principal
            let totalInterest = 0
            let firstCuota = 0
            for (let i = 0; i < installments.length; i++) {
                const inst = installments[i]
                const interestDue = Math.max(0, Number((remaining * periodRate).toFixed(2)))
                const pt = Math.max(0, Math.min(remaining, Number(inst.principal_target) || 0))
                if (i === 0) firstCuota = Number((interestDue + pt).toFixed(2))
                totalInterest += interestDue
                remaining = Math.max(0, Number((remaining - pt).toFixed(2)))
            }
            const totalInterestN = Number(totalInterest.toFixed(2))
            const totalCollected = Number((principal + totalInterestN).toFixed(2))
            const yieldPct = principal > 0 ? Number(((totalInterestN / principal) * 100).toFixed(2)) : 0
            return {
                totalInterest: totalInterestN,
                totalCollected,
                periods: installments.length,
                firstCuota,
                avgCuota: installments.length ? Number((totalCollected / installments.length).toFixed(2)) : 0,
                yieldPct
            }
        }

        function normalizeInstallmentRecord (inst, fallbackPrincipalTarget = 0) {
            if (inst && typeof inst === 'object') {
                return {
                    n: Number(inst.n) || 0,
                    due_date: inst.due_date,
                    principal_target: Number(inst.principal_target != null ? inst.principal_target : (inst.principal_due != null ? inst.principal_due : fallbackPrincipalTarget)) || 0,
                    paid_interest: Number(inst.paid_interest) || 0,
                    paid_principal: Number(inst.paid_principal) || 0,
                    paid_late_fee: Number(inst.paid_late_fee) || 0,
                    legacy_paid_amount: Number(inst.paid_amount) || 0
                }
            }
            return {
                n: 0,
                due_date: isoToday(),
                principal_target: Number(fallbackPrincipalTarget) || 0,
                paid_interest: 0,
                paid_principal: 0,
                paid_late_fee: 0,
                legacy_paid_amount: 0
            }
        }

        function evaluateInstallment (inst, loan, policy, remainingPrincipalAtStart, now = new Date()) {
            const due = new Date(`${inst.due_date}T00:00:00`)
            const periodRate = periodicRateForLoan(loan)
            const interestDue = Math.max(0, Number((remainingPrincipalAtStart * periodRate).toFixed(2)))
            const principalTarget = Math.max(0, Math.min(remainingPrincipalAtStart, Number(inst.principal_target) || 0))
            let paidInterest = Math.max(0, Number(inst.paid_interest) || 0)
            let paidPrincipal = Math.max(0, Number(inst.paid_principal) || 0)
            const paidLateFee = Math.max(0, Number(inst.paid_late_fee) || 0)
            const legacyPaid = Math.max(0, Number(inst.legacy_paid_amount) || 0)
            if (legacyPaid > 0 && paidInterest === 0 && paidPrincipal === 0 && paidLateFee === 0) {
                paidInterest = Math.min(legacyPaid, interestDue)
                paidPrincipal = Math.max(0, legacyPaid - paidInterest)
            }

            const pendingInterest = Math.max(0, interestDue - paidInterest)
            const pendingPrincipal = Math.max(0, principalTarget - paidPrincipal)
            const basePending = pendingInterest + pendingPrincipal

            const msDay = 1000 * 60 * 60 * 24
            const rawDaysLate = basePending > 0 ? Math.floor((now - due) / msDay) : 0
            const grace = Number(policy.grace_days) || 0
            const lateDays = Math.max(0, rawDaysLate - grace)
            const lateFeeAccrued = basePending > 0 ? basePending * ((Number(policy.late_fee_percent) || 0) / 100) * lateDays : 0
            const pendingLateFee = Math.max(0, lateFeeAccrued - paidLateFee)
            const pendingTotal = basePending + pendingLateFee

            let status = 'pendiente'
            if (pendingTotal <= 0.009) status = 'pagado'
            else if (rawDaysLate > grace) status = 'mora'
            else if (rawDaysLate > 0) status = 'atrasado'

            return {
                ...inst,
                interest_due: interestDue,
                principal_target: principalTarget,
                total_due: Number((interestDue + principalTarget).toFixed(2)),
                pending_interest: Number(pendingInterest.toFixed(2)),
                pending_principal: Number(pendingPrincipal.toFixed(2)),
                pending_late_fee: Number(pendingLateFee.toFixed(2)),
                lateFeeAccrued: Number(lateFeeAccrued.toFixed(2)),
                pendingTotal: Number(pendingTotal.toFixed(2)),
                status,
                daysLate: rawDaysLate,
                lateDays
            }
        }

        function summarizeLoan (loan, state, now = new Date()) {
            const policy = state.settings
            const rawInst = Array.isArray(loan.installments) ? loan.installments : []
            const periods = rawInst.length || Math.max(1, Number(loan.term_months) || 1)
            const fallbackTarget = periods > 0 ? (Number(loan.principal) || 0) / periods : (Number(loan.principal) || 0)
            const normalized = rawInst.length ? rawInst.map((i) => normalizeInstallmentRecord(i, fallbackTarget)) : generateInstallments({
                principal: Number(loan.principal) || 0,
                term_months: Number(loan.term_months) || 1,
                payment_frequency: loan.payment_frequency || state.settings.payment_frequency,
                start_date: loan.start_date || isoToday()
            }).map((i) => normalizeInstallmentRecord(i, fallbackTarget))

            let remainingPrincipal = Number(loan.principal) || 0
            const items = []
            for (const inst of normalized.sort((a, b) => a.n - b.n)) {
                const evaluated = evaluateInstallment(inst, loan, policy, remainingPrincipal, now)
                items.push(evaluated)
                remainingPrincipal = Math.max(0, remainingPrincipal - (Number(inst.paid_principal) || 0))
            }

            const pending = items.reduce((s, it) => s + it.pendingTotal, 0)
            const mora = items.reduce((s, it) => s + Math.max(0, it.pending_late_fee || 0), 0)
            const next = items.find((it) => it.status !== 'pagado')
            const paidCount = items.filter((it) => it.status === 'pagado').length
            const status = pending <= 0.009 ? 'finalizado' : (items.some((it) => it.status === 'mora') ? 'moroso' : 'activo')
            const paidTotal = items.reduce((s, it) => s + (Number(it.paid_interest) || 0) + (Number(it.paid_principal) || 0) + (Number(it.paid_late_fee) || 0), 0)
            const collectedInterest = items.reduce((s, it) => s + (Number(it.paid_interest) || 0), 0)
            const collectedLateFees = items.reduce((s, it) => s + (Number(it.paid_late_fee) || 0), 0)
            return {
                items,
                pending: Number(pending.toFixed(2)),
                mora: Number(mora.toFixed(2)),
                next,
                paidCount,
                status,
                paidTotal: Number(paidTotal.toFixed(2)),
                totalInstallments: items.length,
                principalOutstanding: Number(remainingPrincipal.toFixed(2)),
                collectedInterest: Number(collectedInterest.toFixed(2)),
                collectedLateFees: Number(collectedLateFees.toFixed(2))
            }
        }

        function buildAutoNotifications (state, now = new Date()) {
            const out = []
            const reminderDays = Number(state.settings.reminder_days) || 0
            const msDay = 1000 * 60 * 60 * 24
            state.loans.forEach((loan) => {
                const loanSummary = summarizeLoan(loan, state, now)
                loanSummary.items.forEach((inst) => {
                    if (inst.status === 'pagado') return
                    const due = new Date(`${inst.due_date}T00:00:00`)
                    const days = Math.ceil((due - now) / msDay)
                    if (days === reminderDays) out.push({ type: 'recordatorio', text: `Recordatorio: cuota ${inst.n} de ${loan.client_name} vence en ${days} día(s).` })
                    if (inst.status === 'atrasado') out.push({ type: 'atraso', text: `Atraso detectado: cuota ${inst.n} de ${loan.client_name} está vencida.` })
                    if (inst.status === 'mora') out.push({ type: 'mora', text: `Mora generada: cuota ${inst.n} de ${loan.client_name}, recargo ${fmtMoney(inst.lateFeeAccrued)}.` })
                })
            })
            return out.slice(0, 8)
        }

        function saveLoanRequestDraft () {
            const form = document.getElementById('loan-request-form')
            if (!form) return
            const obj = {}
            const fd = new FormData(form)
            fd.forEach((val, key) => { obj[key] = val })
            form.querySelectorAll('input[type="checkbox"]').forEach((cb) => {
                if (cb.name) obj[cb.name] = cb.checked
            })
            try {
                localStorage.setItem('nexo_loan_request_draft', JSON.stringify(obj))
            } catch (_) {}
            alert('Guardado en borrador en este equipo. Puedes retomar el formulario cuando vuelvas a Nuevo préstamo.')
        }

        function hydrateLoanRequestDraft () {
            const form = document.getElementById('loan-request-form')
            if (!form) return
            let draft
            try {
                draft = JSON.parse(localStorage.getItem('nexo_loan_request_draft') || 'null')
            } catch (_) {
                draft = null
            }
            if (!draft || typeof draft !== 'object') return
            Object.keys(draft).forEach((k) => {
                const el = form.elements.namedItem(k)
                const v = draft[k]
                if (!el) return
                if (el instanceof RadioNodeList) {
                    Array.from(el).forEach((r) => { r.checked = r.value === String(v) })
                } else if (el.type === 'checkbox') {
                    el.checked = v === true || v === '1' || v === 1 || v === 'on'
                } else {
                    el.value = v == null ? '' : String(v)
                }
            })
        }

        function initials (name) {
            const p = (name || '').trim().split(/\s+/).filter(Boolean)
            if (!p.length) return 'CL'
            if (p.length === 1) return p[0].slice(0, 2).toUpperCase()
            return `${p[0][0]}${p[p.length - 1][0]}`.toUpperCase()
        }

        function dateLabel (iso) {
            if (!iso) return '—'
            const d = new Date(`${iso}T00:00:00`)
            return d.toLocaleDateString('es-DO', { day: '2-digit', month: 'short', year: 'numeric' })
        }

        function relativeTimeEs (iso) {
            if (!iso) return ''
            const t = new Date(iso).getTime()
            if (Number.isNaN(t)) return ''
            const diffMs = Date.now() - t
            const sec = Math.floor(diffMs / 1000)
            if (sec < 45) return 'Hace un momento'
            const min = Math.floor(sec / 60)
            if (min < 60) return `Hace ${min} min`
            const h = Math.floor(min / 60)
            if (h < 48) return `Hace ${h} h`
            const d = Math.floor(h / 24)
            if (d < 14) return `Hace ${d} día${d === 1 ? '' : 's'}`
            return dateLabel(String(iso).slice(0, 10))
        }

        function sumPrincipalOriginatedBetween (loans, start, end) {
            let s = 0
            for (const loan of loans || []) {
                const od = loanOriginationDate(loan)
                if (od >= start && od <= end) s += Number(loan.principal) || 0
            }
            return s
        }

        function renderDashboardEventsFeed (root, state, now) {
            const feed = root.querySelector('#dash-events-feed')
            if (!feed) return
            const timeline = []
            for (const loan of state.loans || []) {
                const raw = loan.created_at || loan.start_date
                if (!raw) continue
                const t = new Date(raw).getTime()
                if (!Number.isNaN(t)) timeline.push({ t, kind: 'loan', loan })
            }
            for (const p of state.payments || []) {
                if (!p.created_at) continue
                const t = new Date(p.created_at).getTime()
                if (!Number.isNaN(t)) timeline.push({ t, kind: 'payment', p })
            }
            timeline.sort((a, b) => b.t - a.t)
            const top = timeline.slice(0, 8)
            if (!top.length) {
                feed.innerHTML = '<p class="loans-empty-note" style="margin:0">Sin movimientos recientes. Los nuevos préstamos y pagos aparecerán aquí.</p>'
                return
            }
            const loanIcon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>'
            const payIcon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M12 10v4M9 12h6"/></svg>'
            feed.innerHTML = top.map((ev) => {
                if (ev.kind === 'loan') {
                    const { loan } = ev
                    const title = escapeHtml(`Nuevo préstamo · ${loan.client_name || 'Cliente'}`)
                    const when = relativeTimeEs(loan.created_at || loan.start_date)
                    const amt = fmtMoney(Number(loan.principal) || 0)
                    return `<article class="event-item">
                        <div class="event-item__icon event-item__icon--success" aria-hidden="true">${loanIcon}</div>
                        <div class="event-item__title">${title}</div>
                        <div class="event-item__meta">${escapeHtml(when)} · ${escapeHtml(amt)} principal</div>
                    </article>`
                }
                const { p } = ev
                const loanRow = (state.loans || []).find((l) => l.id === p.loan_id)
                const ref = loanRow ? displayLoanRef(loanRow) : (p.loan_id ? String(p.loan_id).slice(0, 8) : '—')
                const title = escapeHtml(`Pago registrado · ${ref}`)
                const when = relativeTimeEs(p.created_at)
                const amt = fmtMoney(Number(p.amount) || 0)
                return `<article class="event-item">
                    <div class="event-item__icon event-item__icon--info" aria-hidden="true">${payIcon}</div>
                    <div class="event-item__title">${title}</div>
                    <div class="event-item__meta">${escapeHtml(when)} · ${escapeHtml(amt)}</div>
                </article>`
            }).join('')
        }

        function getHeaderPaymentDueRows () {
            const state = getLoanState()
            const now = new Date()
            const map = new Map()
            state.loans.forEach((loan) => {
                const client = state.clients.find((c) => c.id === loan.client_id)
                if (!client) return
                const sum = summarizeLoan(loan, state, now)
                if (sum.pending <= 0.009) return
                const moraAmt = Number(sum.mora) || 0
                const moroso = sum.status === 'moroso' || moraAmt > 0.009
                const existing = map.get(loan.client_id)
                if (!existing) {
                    map.set(loan.client_id, {
                        clientId: loan.client_id,
                        name: client.name,
                        pending: sum.pending,
                        mora: moraAmt,
                        moroso,
                        primaryLoanId: loan.id,
                        _primaryLoanPending: sum.pending,
                        _primaryLoanMoroso: moroso
                    })
                    return
                }
                existing.pending += sum.pending
                existing.mora += moraAmt
                existing.moroso = existing.moroso || moroso
                const preferThis =
                    sum.pending > existing._primaryLoanPending + 0.005 ||
                    (Math.abs(sum.pending - existing._primaryLoanPending) <= 0.005 &&
                        moroso && !existing._primaryLoanMoroso)
                if (preferThis) {
                    existing.primaryLoanId = loan.id
                    existing._primaryLoanPending = sum.pending
                    existing._primaryLoanMoroso = moroso
                }
            })
            return [...map.values()]
                .map(({ _primaryLoanPending, _primaryLoanMoroso, ...r }) => r)
                .sort((a, b) => b.pending - a.pending)
                .slice(0, 25)
        }

        const MONTH_SHORT_ES = ['ENE', 'FEB', 'MAR', 'ABR', 'MAY', 'JUN', 'JUL', 'AGO', 'SEP', 'OCT', 'NOV', 'DIC']

        function loanOriginationDate (loan) {
            const raw = loan.created_at || loan.start_date
            if (!raw) return new Date()
            const d = new Date(String(raw).slice(0, 10) + 'T12:00:00')
            return Number.isNaN(d.getTime()) ? new Date() : d
        }

        function loanQualityBucket (sum) {
            if (sum.pending <= 0.009) return 'current'
            if (sum.status === 'moroso') return 'default'
            if (sum.items.some((it) => it.status === 'atrasado')) return 'late'
            return 'current'
        }

        function isBrokerProductLoan (loan) {
            const p = String(loan.product || '').toLowerCase()
            return p === 'comercial' || p === 'pyme'
        }

        function regionFromClientAddress (address) {
            if (!address || !String(address).trim()) return 'Sin ubicación'
            const first = String(address).split(',')[0].trim()
            return first.slice(0, 48) || 'Sin ubicación'
        }

        function getDashboardTimeRanges (period, now) {
            const n = 4
            if (period === 'yearly') {
                const y0 = now.getFullYear()
                return [...Array(n)].map((_, i) => {
                    const y = y0 - (n - 1 - i)
                    const start = new Date(y, 0, 1, 0, 0, 0, 0)
                    const end = new Date(y, 11, 31, 23, 59, 59, 999)
                    const isCurrent = i === n - 1
                    return { start, end, label: isCurrent ? `Actual (${y})` : String(y), isCurrent }
                })
            }
            if (period === 'monthly') {
                return [...Array(n)].map((_, i) => {
                    const d = new Date(now.getFullYear(), now.getMonth() - (n - 1 - i), 1)
                    const y = d.getFullYear()
                    const m = d.getMonth()
                    const start = new Date(y, m, 1, 0, 0, 0, 0)
                    const end = new Date(y, m + 1, 0, 23, 59, 59, 999)
                    const isCurrent = i === n - 1
                    return {
                        start,
                        end,
                        label: isCurrent ? `Actual (${MONTH_SHORT_ES[m]})` : `${MONTH_SHORT_ES[m]} ${y}`,
                        isCurrent
                    }
                })
            }
            const qStack = []
            let yy = now.getFullYear()
            let qq = Math.floor(now.getMonth() / 3) + 1
            for (let i = 0; i < n; i++) {
                qStack.push({ yy, qq })
                qq -= 1
                if (qq < 1) {
                    qq = 4
                    yy -= 1
                }
            }
            return qStack.reverse().map((r, idx) => {
                const start = new Date(r.yy, (r.qq - 1) * 3, 1, 0, 0, 0, 0)
                const end = new Date(r.yy, r.qq * 3, 0, 23, 59, 59, 999)
                const isCurrent = idx === n - 1
                return { start, end, label: isCurrent ? `Actual (Q${r.qq})` : `Q${r.qq} ${r.yy}`, isCurrent }
            })
        }

        function renderDashDistributionChart (root, state, now) {
            const mount = root.querySelector('#dash-distribution-chart')
            if (!mount) return
            const periodBtn = root.querySelector('.period-toggle__btn.is-active[data-period]')
            const period = periodBtn?.getAttribute('data-period') || 'monthly'
            const ranges = getDashboardTimeRanges(period, now)
            const summaries = state.loans.map((loan) => ({ loan, sum: summarizeLoan(loan, state, now) }))
            const parts = []
            let ariaBits = []
            for (const r of ranges) {
                let wCur = 0
                let wLate = 0
                let wDef = 0
                for (const { loan, sum } of summaries) {
                    const od = loanOriginationDate(loan)
                    if (od < r.start || od > r.end) continue
                    const pr = Number(loan.principal) || 0
                    const b = loanQualityBucket(sum)
                    if (b === 'default') wDef += pr
                    else if (b === 'late') wLate += pr
                    else wCur += pr
                }
                const tot = wCur + wLate + wDef
                const flex = (v) => (tot < 1 ? 1 : Math.max(1, Math.round((v / tot) * 1000)))
                const labelCls = r.isCurrent ? 'chart-label chart-label--emphasis' : 'chart-label'
                parts.push(`
                    <div class="chart-q">
                        <div class="chart-stack">
                            <div class="chart-seg chart-seg--default" style="flex: ${flex(wDef)} 0 0" title="Incumplimiento ${fmtMoney(wDef)}"></div>
                            <div class="chart-seg chart-seg--late" style="flex: ${flex(wLate)} 0 0" title="Atraso ${fmtMoney(wLate)}"></div>
                            <div class="chart-seg chart-seg--current" style="flex: ${flex(wCur)} 0 0" title="Al día ${fmtMoney(wCur)}"></div>
                        </div>
                        <span class="${labelCls}">${r.label}</span>
                    </div>`)
                ariaBits.push(`${r.label}: al día ${fmtMoney(wCur)}, atraso ${fmtMoney(wLate)}, incumplimiento ${fmtMoney(wDef)}`)
            }
            mount.innerHTML = parts.join('')
            mount.setAttribute('aria-label', `Distribución por ${period === 'monthly' ? 'mes' : (period === 'yearly' ? 'año' : 'trimestre')} (monto originado). ${ariaBits.join('; ')}`)
        }

        function buildSmoothLinePathD (values, w, h, padY) {
            const n = values.length
            if (n === 0) return ''
            const mx = Math.max(...values, 1)
            const padX = 8
            const innerW = w - padX * 2
            const innerH = h - padY * 2
            const pts = values.map((v, i) => {
                const x = n === 1 ? w / 2 : padX + (i / (n - 1)) * innerW
                const y = padY + innerH - (v / mx) * innerH
                return [x, y]
            })
            if (pts.length === 1) return `M ${pts[0][0]},${pts[0][1]}`
            let d = `M ${pts[0][0]},${pts[0][1]}`
            for (let i = 0; i < pts.length - 1; i++) {
                const [x0, y0] = pts[i]
                const [x1, y1] = pts[i + 1]
                const cx = (x0 + x1) / 2
                d += ` C ${cx},${y0} ${cx},${y1} ${x1},${y1}`
            }
            return d
        }

        function getAnalyticsPeriodDays (periodKey) {
            if (periodKey === '30d') return 30
            if (periodKey === 'q') return 90
            return 365
        }

        function getAnalyticsSliceRanges (periodKey, now) {
            const days = getAnalyticsPeriodDays(periodKey)
            const segments = 6
            const sliceMs = (days * 86400000) / segments
            const tEnd = now.getTime()
            const tStart = tEnd - days * 86400000
            const ranges = []
            for (let i = 0; i < segments; i++) {
                const a = tStart + i * sliceMs
                const b = tStart + (i + 1) * sliceMs
                ranges.push({ start: new Date(a), end: new Date(b) })
            }
            const labels = ranges.map((r) => {
                const m = r.start.getMonth()
                const d = r.start.getDate()
                if (periodKey === 'y') return `${MONTH_SHORT_ES[m]}`
                if (periodKey === 'q') return `${d} ${MONTH_SHORT_ES[m]}`
                return `${d}/${String(m + 1).padStart(2, '0')}`
            })
            return { ranges, labels }
        }

        function conicRiskGradient (pctA, pctB, pctC) {
            const t = pctA + pctB + pctC
            if (t < 0.5) return 'conic-gradient(from -90deg, #e2e8f0 0deg 360deg)'
            const a = (pctA / t) * 360
            const b = (pctB / t) * 360
            const c = (pctC / t) * 360
            const d1 = a
            const d2 = a + b
            return `conic-gradient(from -90deg, #00234b 0deg ${d1}deg, #85f8c4 ${d1}deg ${d2}deg, #d8e3fb ${d2}deg 360deg)`
        }

        function renderDashboardView () {
            const root = document.getElementById('portal-main')
            const repaymentsBody = root?.querySelector('#dash-repayments-body')
            if (!repaymentsBody) return
            const state = getLoanState()
            const now = new Date()
            const summaries = state.loans.map((loan) => ({ loan, sum: summarizeLoan(loan, state, now) }))
            const totalPrestado = summaries.reduce((s, x) => s + (Number(x.loan.principal) || 0), 0)
            const totalCobrado = summaries.reduce((s, x) => s + x.sum.paidTotal, 0)
            const totalMora = summaries.reduce((s, x) => s + x.sum.mora, 0)
            const morosos = summaries.filter((x) => x.sum.status === 'moroso').length
            const ganancias = summaries.reduce((s, x) => s + x.sum.collectedInterest + x.sum.collectedLateFees, 0)

            const setText = (id, v) => { const el = root.querySelector(`#${id}`); if (el) el.textContent = v }
            setText('dash-kpi-value-1', fmtMoney(totalPrestado))
            setText('dash-kpi-value-2', fmtMoney(totalCobrado))
            setText('dash-kpi-value-3', String(morosos))
            setText('dash-kpi-value-4', fmtMoney(ganancias))
            setText('dash-kpi-meta-2', `${state.payments.length} pagos registrados`)
            setText('dash-kpi-meta-3', totalMora > 0 ? `${fmtMoney(totalMora)} en mora acumulada` : 'Sin mora activa')

            const pageLead = root.querySelector('#dash-page-lead')
            if (pageLead) pageLead.textContent = dashboardPageLeadText(state, now)

            const curMonthStart = new Date(now.getFullYear(), now.getMonth(), 1, 0, 0, 0, 0)
            const curMonthEnd = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59, 999)
            const prevMonthStart = new Date(now.getFullYear(), now.getMonth() - 1, 1, 0, 0, 0, 0)
            const prevMonthEnd = new Date(now.getFullYear(), now.getMonth(), 0, 23, 59, 59, 999)
            const curOrig = sumPrincipalOriginatedBetween(state.loans, curMonthStart, curMonthEnd)
            const prevOrig = sumPrincipalOriginatedBetween(state.loans, prevMonthStart, prevMonthEnd)
            const meta1 = root.querySelector('#dash-kpi-meta-1')
            if (meta1) {
                let cls = 'kpi-card__meta kpi-card__meta--muted'
                let txt = ''
                if (curOrig < 1 && prevOrig < 1) {
                    txt = 'Sin originación registrada en los dos últimos meses'
                } else if (prevOrig < 1 && curOrig >= 1) {
                    txt = `${fmtMoney(curOrig)} originados este mes (sin base el mes anterior)`
                    cls = 'kpi-card__meta kpi-card__meta--success'
                } else {
                    const pct = ((curOrig - prevOrig) / prevOrig) * 100
                    const sign = pct >= 0 ? '+' : ''
                    txt = `${sign}${pct.toFixed(1)}% vs mes anterior · ${fmtMoney(curOrig)} vs ${fmtMoney(prevOrig)}`
                    if (pct > 0.5) cls = 'kpi-card__meta kpi-card__meta--success'
                    else if (pct < -0.5) cls = 'kpi-card__meta kpi-card__meta--danger'
                }
                meta1.className = cls
                meta1.textContent = txt
            }

            const withBal = summaries.filter((x) => x.sum.pending > 0.009).length
            const meta4 = root.querySelector('#dash-kpi-meta-4')
            if (meta4) {
                if (totalPrestado > 0.01) {
                    const pctCollected = Math.min(100, Math.round((totalCobrado / totalPrestado) * 100))
                    meta4.textContent = `${withBal} préstamo(s) con saldo · ~${pctCollected}% del principal cobrado acumulado`
                } else {
                    meta4.textContent = withBal ? `${withBal} préstamo(s) con saldo pendiente` : 'Sin principal en cartera todavía'
                }
                meta4.className = 'kpi-card__meta kpi-card__meta--muted'
            }

            const insightEl = root.querySelector('#dash-insight-body')
            if (insightEl) {
                const anyAtraso = summaries.some((x) => x.sum.items.some((it) => it.status === 'atrasado'))
                if (!state.loans.length) {
                    insightEl.innerHTML = 'Aún no hay préstamos. Usa <strong>Nueva solicitud de préstamo</strong> para registrar la primera operación.'
                } else if (morosos > 0) {
                    insightEl.textContent = `Tienes ${morosos} préstamo(s) en mora. Revisa vencimientos y prioriza el seguimiento de cobro.`
                } else if (anyAtraso) {
                    insightEl.textContent = 'Hay cuotas atrasadas. Registra pagos o revisa días de gracia en la política de crédito.'
                } else {
                    insightEl.textContent = 'Sin morosidad declarada en la cartera. Mantén actualizado el calendario de cobros.'
                }
            }

            renderDashboardEventsFeed(root, state, now)

            const installments = summaries.flatMap(({ loan, sum }) => sum.items
                .filter((it) => it.status !== 'pagado')
                .map((it) => ({ loan, it })))
                .sort((a, b) => a.it.due_date.localeCompare(b.it.due_date))
                .slice(0, 8)

            repaymentsBody.innerHTML = installments.length
                ? installments.map(({ loan, it }) => `
                    <tr>
                        <td><div class="cell-user"><span class="cell-avatar" aria-hidden="true">${initials(loan.client_name)}</span><span class="cell-name">${loan.client_name}</span></div></td>
                        <td class="cell-ref">${displayLoanRef(loan)}</td>
                        <td class="cell-amount text-right">${fmtMoney(it.total_due)}</td>
                        <td class="cell-date">${dateLabel(it.due_date)}</td>
                        <td><span class="dash-badge ${it.status === 'mora' ? 'dash-badge--followup' : 'dash-badge--autopay'}">${it.status}</span></td>
                    </tr>
                `).join('')
                : '<tr><td colspan="5" class="loans-empty-note">Sin cuotas pendientes.</td></tr>'
            renderDashDistributionChart(root, state, now)
        }

        function renderAnalyticsView () {
            const root = document.getElementById('portal-main')
            if (!root?.querySelector('.analytics-canvas')) return
            const state = getLoanState()
            const now = new Date()
            const summaries = state.loans.map((loan) => ({ loan, sum: summarizeLoan(loan, state, now) }))
            const overdue = summaries.filter((x) => x.sum.items.some((i) => i.status === 'atrasado' || i.status === 'mora')).length
            const active = summaries.filter((x) => x.sum.status === 'activo' || x.sum.status === 'moroso').length
            const y = now.getFullYear()
            const m = now.getMonth()
            const monthProfit = state.payments.filter((p) => {
                const d = new Date(p.created_at)
                return d.getFullYear() === y && d.getMonth() === m
            }).reduce((s, p) => {
                const br = p.breakdown || {}
                return s + (Number(br.interest) || 0) + (Number(br.late_fee) || 0)
            }, 0)
            const setText = (id, v) => { const el = root.querySelector(`#${id}`); if (el) el.textContent = v }
            setText('analytics-kpi-active-loans', String(active))
            setText('analytics-kpi-overdue-loans', String(overdue))
            setText('analytics-kpi-payments', String(state.payments.length))
            setText('analytics-kpi-monthly-profit', fmtMoney(monthProfit))

            const prevY = m === 0 ? y - 1 : y
            const prevM = m === 0 ? 11 : m - 1
            const prevMonthProfit = state.payments.filter((p) => {
                const d = new Date(p.created_at)
                return d.getFullYear() === prevY && d.getMonth() === prevM
            }).reduce((s, p) => {
                const br = p.breakdown || {}
                return s + (Number(br.interest) || 0) + (Number(br.late_fee) || 0)
            }, 0)

            const periodBtn = root.querySelector('.analytics-period__btn.is-active[data-period]')
            const periodKey = periodBtn?.getAttribute('data-period') || '30d'
            const { ranges, labels } = getAnalyticsSliceRanges(periodKey, now)
            const winStart = ranges[0].start
            const winEnd = ranges[ranges.length - 1].end
            const loansNewInWin = (state.loans || []).filter((loan) => {
                const od = loanOriginationDate(loan)
                return od >= winStart && od <= winEnd
            }).length
            const paymentsInWin = (state.payments || []).filter((p) => {
                const d = new Date(p.created_at)
                return !Number.isNaN(d.getTime()) && d >= winStart && d <= winEnd
            }).length

            const pillActive = root.querySelector('#analytics-kpi-pill-active')
            if (pillActive) {
                pillActive.textContent = loansNewInWin ? `${loansNewInWin} nueva(s) en el periodo` : 'Sin nuevas originaciones'
                pillActive.className = 'analytics-kpi__pill analytics-kpi__pill--neutral'
            }
            const pillPay = root.querySelector('#analytics-kpi-pill-payments')
            if (pillPay) {
                pillPay.textContent = paymentsInWin ? `${paymentsInWin} pago(s) en el periodo` : 'Sin pagos en el periodo'
                pillPay.className = 'analytics-kpi__pill analytics-kpi__pill--neutral'
            }
            const pillProfit = root.querySelector('#analytics-kpi-pill-profit')
            if (pillProfit) {
                if (monthProfit < 0.01 && prevMonthProfit < 0.01) {
                    pillProfit.textContent = 'Sin interés/mora este mes'
                    pillProfit.className = 'analytics-kpi__pill analytics-kpi__pill--neutral'
                } else if (prevMonthProfit < 0.01 && monthProfit >= 0.01) {
                    pillProfit.textContent = 'Primer mes con ingresos (int./mora)'
                    pillProfit.className = 'analytics-kpi__pill analytics-kpi__pill--up'
                } else {
                    const pchg = ((monthProfit - prevMonthProfit) / prevMonthProfit) * 100
                    const sign = pchg >= 0 ? '+' : ''
                    pillProfit.textContent = `${sign}${pchg.toFixed(1)}% vs mes anterior`
                    if (pchg > 1) pillProfit.className = 'analytics-kpi__pill analytics-kpi__pill--up'
                    else if (pchg < -1) pillProfit.className = 'analytics-kpi__pill analytics-kpi__pill--stable'
                    else pillProfit.className = 'analytics-kpi__pill analytics-kpi__pill--neutral'
                }
            }

            root.querySelectorAll('[data-analytics-report-meta]').forEach((el) => {
                el.textContent = `Datos de cartera · ${now.toLocaleDateString('es-DO', { day: 'numeric', month: 'short', year: 'numeric' })}`
            })
            const directSeries = []
            const brokerSeries = []
            for (const r of ranges) {
                let d = 0
                let b = 0
                for (const loan of state.loans) {
                    const od = loanOriginationDate(loan)
                    if (od < r.start || od > r.end) continue
                    const pr = Number(loan.principal) || 0
                    if (isBrokerProductLoan(loan)) b += pr
                    else d += pr
                }
                directSeries.push(d)
                brokerSeries.push(b)
            }
            const pathDirect = root.querySelector('#analytics-origination-path-direct')
            const pathBroker = root.querySelector('#analytics-origination-path-broker')
            if (pathDirect) pathDirect.setAttribute('d', buildSmoothLinePathD(directSeries, 800, 200, 24))
            if (pathBroker) pathBroker.setAttribute('d', buildSmoothLinePathD(brokerSeries, 800, 200, 24))
            const labMount = root.querySelector('#analytics-origination-labels')
            if (labMount) labMount.innerHTML = labels.map((t) => `<span>${t}</span>`).join('')

            const openLoans = summaries.filter((x) => x.sum.pending > 0.009)
            let expA = 0
            let expB = 0
            let expC = 0
            for (const { sum } of openLoans) {
                const w = sum.pending
                if (sum.status === 'moroso') expC += w
                else if (sum.items.some((it) => it.status === 'atrasado')) expB += w
                else expA += w
            }
            const riskTot = expA + expB + expC
            const pct = (x) => (riskTot > 0 ? Math.round((x / riskTot) * 100) : 0)
            const pA = pct(expA)
            const pB = pct(expB)
            const pC = pct(expC)
            const ring = root.querySelector('#analytics-risk-ring')
            if (ring) ring.style.background = conicRiskGradient(pA, pB, pC)
            const gradeEl = root.querySelector('#analytics-risk-grade')
            const subEl = root.querySelector('#analytics-risk-sub')
            let grade = '—'
            if (riskTot > 0.02) {
                if (expC >= expA && expC >= expB) grade = 'C'
                else if (expB >= expA && expB >= expC) grade = 'B'
                else grade = 'A+'
            } else {
                grade = openLoans.length ? 'A+' : '—'
            }
            if (gradeEl) gradeEl.textContent = grade
            if (subEl) subEl.textContent = riskTot > 0.02 ? 'Por exposición vigente' : (openLoans.length ? 'Exposición baja' : 'Sin cartera activa')

            const leg = root.querySelector('#analytics-risk-legend')
            if (leg) {
                leg.innerHTML = `
                    <div class="analytics-donut-legend__row">
                        <span class="analytics-donut-legend__left"><span class="analytics-donut-legend__dot" style="background:#00234b"></span> Grado A–A+ (al día)</span>
                        <span class="analytics-donut-legend__pct">${pA}%</span>
                    </div>
                    <div class="analytics-donut-legend__row">
                        <span class="analytics-donut-legend__left"><span class="analytics-donut-legend__dot" style="background:#85f8c4"></span> Grado B (atraso sin mora)</span>
                        <span class="analytics-donut-legend__pct">${pB}%</span>
                    </div>
                    <div class="analytics-donut-legend__row">
                        <span class="analytics-donut-legend__left"><span class="analytics-donut-legend__dot" style="background:#d8e3fb"></span> Grado C (mora)</span>
                        <span class="analytics-donut-legend__pct">${pC}%</span>
                    </div>`
            }

            const geoMap = new Map()
            for (const { loan, sum } of summaries) {
                if (sum.pending <= 0.009) continue
                const client = state.clients.find((c) => c.id === loan.client_id)
                const reg = regionFromClientAddress(client?.address || '')
                geoMap.set(reg, (geoMap.get(reg) || 0) + sum.pending)
            }
            const geoTotal = [...geoMap.values()].reduce((a, b) => a + b, 0)
            const geoSorted = [...geoMap.entries()].sort((a, b) => b[1] - a[1]).slice(0, 6)
            const geoBody = root.querySelector('#analytics-geo-body')
            if (geoBody) {
                geoBody.innerHTML = geoSorted.length
                    ? geoSorted.map(([name, amt]) => {
                        const pc = geoTotal > 0 ? Math.round((amt / geoTotal) * 100) : 0
                        const safe = escapeHtml(name)
                        return `<div class="analytics-geo__row">
                            <div class="analytics-geo__head"><span>${safe}</span><span>${pc}%</span></div>
                            <div class="analytics-geo__track"><div class="analytics-geo__fill" style="width:${pc}%"></div></div>
                        </div>`
                    }).join('')
                    : '<p class="loans-empty-note" style="margin:0">Sin exposición geográfica (agrega direcciones en clientes).</p>'
            }

            const badge = root.querySelector('#analytics-reports-badge')
            if (badge) {
                const fq = Math.floor(now.getMonth() / 3) + 1
                badge.textContent = `Cartera en vivo · Q${fq} ${now.getFullYear()}`
            }
        }

        function exportSystemReport (type) {
            const state = getLoanState()
            const now = new Date()
            const summaries = state.loans.map((loan) => ({ loan, sum: summarizeLoan(loan, state, now) }))
            let payload = {}
            if (type === 'active-loans') payload = summaries.filter((x) => x.sum.status !== 'finalizado')
            else if (type === 'overdue-loans') payload = summaries.filter((x) => x.sum.status === 'moroso')
            else if (type === 'payments-history') payload = state.payments
            else if (type === 'loans-summary') payload = summaries
            else payload = { state, generated_at: new Date().toISOString() }
            const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' })
            const a = document.createElement('a')
            a.href = URL.createObjectURL(blob)
            a.download = `nexo-${type}.json`
            a.click()
            URL.revokeObjectURL(a.href)
        }

        function populatePaymentInstallmentSelect (loanId) {
            const root = document.getElementById('portal-main')
            const state = getLoanState()
            const instSel = root?.querySelector('#payment-installment-select')
            if (!instSel) return
            const loan = state.loans.find((l) => l.id === loanId)
            if (!loan) {
                instSel.innerHTML = ''
                return
            }
            const summary = summarizeLoan(loan, state)
            const options = summary.items.filter((i) => i.status !== 'pagado')
                .map((i) => `<option value="${i.n}">Cuota ${i.n} · ${dateLabel(i.due_date)} · ${fmtMoney(i.pendingTotal)}</option>`)
            instSel.innerHTML = options.join('')
        }

        function focusLoanPaymentForm (root, preselectLoanId) {
            if (!root) return
            const form = root.querySelector('#loan-payment-form')
            const loanSel = root.querySelector('#payment-loan-select')
            const section = root.querySelector('#loan-payment-section')
            if (!form || !loanSel) return
            if (preselectLoanId && [...loanSel.options].some((o) => o.value === preselectLoanId)) {
                loanSel.value = preselectLoanId
                populatePaymentInstallmentSelect(preselectLoanId)
            }

            scrollTarget.scrollIntoView({ behavior: 'smooth', block: 'start' })
            window.setTimeout(() => {
                const amt = root.querySelector('#payment-amount-input')
                if (amt) amt.focus({ preventScroll: true })
                else loanSel.focus({ preventScroll: true })
            }, 320)
        }

        function renderLoansView () {

            if (!tableBody) return
            const state = getLoanState()
            const now = new Date()

            const typeFilter = root.querySelector('#filter-tipo')?.value || 'todos'
